<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Judoboards Rebuild — Little Barditchevers</title>
<link rel="icon" href="data:,">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#EEF3EA;--surface:#FFFFFF;--surface-soft:#F7FAF4;--border:#CAD7C7;--border-strong:#91A28E;
  --text:#111A14;--muted:#53624F;--faint:#84917F;
  --accent:#174A36;--accent-l:#DDECE3;--accent-m:#3F7E5C;
  --gold:#A97013;--gold-l:#FFF1CD;
  --danger:#C44A2A;--danger-l:#FDF0EC;
  --shadow:0 8px 28px rgba(38,48,32,.08);
  --panel:380px;--card-w:462px;--card-h:640px;--viewer-ratio:16/9;--r:10px;--rs:7px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Instrument Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;line-height:1.45;}

/* ── HEADER ── */
.hdr{background:rgba(255,255,255,.96);border-bottom:1px solid var(--border);padding:12px 22px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;gap:12px;flex-wrap:wrap;box-shadow:0 1px 12px rgba(38,48,32,.04);}
.hdr-brand{display:flex;align-items:baseline;gap:10px;}
.hdr-brand h1{font-family:'DM Serif Display',serif;font-size:22px;letter-spacing:-.2px;}
.hdr-brand .proj{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);}
.hdr-actions{display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
.btn{font-family:'Instrument Sans',sans-serif;font-size:12px;font-weight:600;padding:7px 13px;border-radius:var(--rs);border:1px solid var(--border);background:var(--surface);color:var(--text);cursor:pointer;transition:all .15s;white-space:nowrap;}
.btn:hover{background:var(--bg);border-color:var(--border-strong);}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent);}
.btn-primary:hover{background:#1e4530;}
.btn-gold{background:var(--gold);color:#fff;border-color:var(--gold);}
.btn-gold:hover{background:#a67d20;}
.btn-ghost{border-color:transparent;background:transparent;}
.btn-ghost:hover{background:var(--bg);border-color:var(--border);}
.btn-sm{padding:4px 9px;font-size:11px;}
.btn-active{background:var(--accent-l);border-color:var(--accent);color:var(--accent);}

/* ── TOOLBAR ── */
.toolbar{background:rgba(250,251,248,.95);border-bottom:1px solid var(--border);padding:10px 24px;display:flex;align-items:center;gap:9px;flex-wrap:wrap;position:sticky;top:58px;z-index:190;}
.toolbar-label{font-family:'DM Mono',monospace;font-size:10px;color:var(--faint);letter-spacing:.08em;text-transform:uppercase;margin-right:4px;}
.filter-pill{display:inline-flex;align-items:center;gap:5px;padding:5px 11px;border-radius:20px;border:1px solid var(--border);background:var(--surface);font-size:12px;color:var(--muted);cursor:pointer;transition:all .15s;font-family:'Instrument Sans',sans-serif;}
.filter-pill:hover{border-color:var(--border-strong);background:var(--bg);}
.filter-pill.active{background:var(--accent-l);border-color:var(--accent);color:var(--accent);font-weight:500;}
.filter-pill select{border:none;background:transparent;font-size:12px;color:inherit;outline:none;cursor:pointer;font-family:'Instrument Sans',sans-serif;max-width:130px;}
.sort-group{display:flex;align-items:center;gap:4px;margin-left:auto;}
.sort-btn{font-family:'DM Mono',monospace;font-size:11px;padding:4px 9px;border-radius:var(--rs);border:1px solid var(--border);background:var(--surface);color:var(--muted);cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:4px;}
.sort-btn:hover{background:var(--bg);}
.sort-btn.active{background:var(--accent-l);border-color:var(--accent);color:var(--accent);}
.divider{width:1px;height:20px;background:var(--border);flex-shrink:0;}
.search-wrap{position:relative;}
.search-wrap input{font-family:'Instrument Sans',sans-serif;font-size:12px;color:var(--text);background:var(--bg);border:1px solid var(--border);border-radius:20px;padding:4px 10px 4px 28px;outline:none;width:160px;transition:all .15s;}
.search-wrap input:focus{border-color:var(--accent);background:var(--accent-l);width:200px;}
.search-icon{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--faint);pointer-events:none;}
.selection-bar{display:none;position:sticky;top:103px;z-index:185;background:var(--accent-l);border-bottom:1px solid var(--accent);padding:8px 24px;align-items:center;gap:8px;color:var(--accent);font-size:12px;box-shadow:0 4px 14px rgba(38,48,32,.06);}
.selection-bar.show{display:flex;}
.selection-bar strong{font-weight:700;margin-right:auto;}
.selection-bar .btn-danger{color:#fff;background:var(--danger);border-color:var(--danger);}
.selection-bar .btn-danger:hover{background:#A83D23;}

/* ── LAYOUT ── */
.layout{display:flex;min-height:calc(100vh - 93px);}

/* ── WRITE PANEL ── */
.write-panel{width:var(--panel);min-width:var(--panel);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:sticky;top:103px;height:calc(100vh - 103px);overflow:hidden;transition:width .25s,min-width .25s;box-shadow:4px 0 20px rgba(38,48,32,.04);}
.write-panel.collapsed{width:0;min-width:0;overflow:hidden;border-right:none;}
.panel-rail{position:fixed;left:var(--panel);top:50%;transform:translateY(-50%);z-index:210;background:var(--accent);color:#fff;border:1px solid var(--accent);border-left:none;border-radius:0 8px 8px 0;padding:10px 7px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;writing-mode:vertical-rl;text-orientation:mixed;cursor:pointer;box-shadow:0 8px 24px rgba(0,0,0,.16);transition:left .25s;}
.panel-rail:hover{background:#0F3828;}
body.panel-closed .panel-rail{left:0;}
.panel-hdr{padding:15px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;background:var(--surface-soft);}
.panel-hdr h2{font-family:'DM Serif Display',serif;font-size:18px;}
.panel-tabs{display:flex;gap:2px;background:var(--bg);border-radius:var(--rs);padding:3px;flex-shrink:0;margin:10px 13px 0;}
.ptab{flex:1;text-align:center;font-size:12px;font-weight:500;padding:5px 6px;border-radius:4px;cursor:pointer;color:var(--muted);transition:all .15s;border:none;background:none;font-family:'Instrument Sans',sans-serif;}
.ptab.active{background:var(--surface);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.08);}
.panel-body{flex:1;overflow-y:auto;padding:15px;}
.panel-body::-webkit-scrollbar{width:4px;}
.panel-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.write-area{display:flex;flex-direction:column;gap:9px;}
.chat-area{height:100%;min-height:0;display:flex;flex-direction:column;gap:10px;}
.chat-config{display:grid;grid-template-columns:minmax(0,1fr) 92px auto;gap:6px;align-items:center;}
.chat-config input{font-family:'Instrument Sans',sans-serif;font-size:12px;color:var(--text);background:var(--surface-soft);border:1px solid var(--border);border-radius:var(--rs);padding:7px 8px;outline:none;min-width:0;}
.chat-config input:focus{border-color:var(--accent);background:var(--accent-l);}
.chat-status{grid-column:1/-1;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);padding:0 2px;}
.chat-status.on{color:var(--accent);}
.chat-log{flex:1;min-height:260px;overflow-y:auto;border:1px solid var(--border);border-radius:var(--r);background:var(--surface-soft);padding:10px;display:flex;flex-direction:column;gap:8px;scrollbar-gutter:stable;}
.chat-log::-webkit-scrollbar,.card-body::-webkit-scrollbar{width:7px;}
.chat-log::-webkit-scrollbar-thumb,.card-body::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:999px;}
.chat-msg{max-width:92%;font-size:12px;line-height:1.45;border:1px solid var(--border);border-radius:9px;padding:8px 10px;background:var(--surface);}
.chat-msg.user{align-self:flex-end;background:var(--accent);border-color:var(--accent);color:#fff;}
.chat-msg.assistant{align-self:flex-start;color:var(--text);}
.chat-msg .chat-meta{font-family:'DM Mono',monospace;font-size:9px;color:var(--faint);letter-spacing:.08em;text-transform:uppercase;margin-bottom:3px;}
.chat-msg.user .chat-meta{color:rgba(255,255,255,.65);}
.chat-box{display:flex;gap:7px;align-items:flex-end;}
.chat-input{flex:1;min-height:70px;max-height:150px;resize:vertical;font-family:'Instrument Sans',sans-serif;font-size:13px;color:var(--text);background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:9px 10px;outline:none;line-height:1.45;}
.chat-input:focus{border-color:var(--accent);background:var(--accent-l);}
.chat-send{height:38px;align-self:flex-end;}
.lyrics-panel{display:flex;flex-direction:column;gap:10px;}
.song-card{border:1px solid var(--border);border-radius:var(--r);background:var(--surface-soft);padding:10px;display:flex;flex-direction:column;gap:8px;}
.song-row{display:flex;gap:7px;align-items:center;}
.song-row input,.song-row select{flex:1;min-width:0;font-family:'Instrument Sans',sans-serif;font-size:13px;color:var(--text);background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:8px 9px;outline:none;}
.song-row input:focus,.song-row select:focus,.song-lyrics:focus{border-color:var(--accent);background:var(--accent-l);}
.song-file{display:flex;align-items:center;justify-content:space-between;gap:8px;border:1px dashed var(--border-strong);border-radius:var(--rs);background:var(--surface);padding:9px 10px;color:var(--muted);font-size:12px;}
.song-file span{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.song-lyrics{width:100%;min-height:300px;resize:vertical;font-family:'Instrument Sans',sans-serif;font-size:13px;line-height:1.55;color:var(--text);background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:10px;outline:none;}
.song-actions{display:flex;gap:6px;flex-wrap:wrap;}
.song-note{font-size:11px;color:var(--faint);line-height:1.45;}
.wf label{font-size:10px;font-family:'DM Mono',monospace;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);display:block;margin-bottom:4px;}
.wf input,.wf textarea,.wf select{width:100%;font-family:'Instrument Sans',sans-serif;font-size:13px;color:var(--text);background:var(--surface-soft);border:1px solid var(--border);border-radius:var(--rs);padding:8px 10px;outline:none;transition:border-color .15s,background .15s;}
.wf input:focus,.wf textarea:focus,.wf select:focus{border-color:var(--accent);background:var(--accent-l);}
.wf textarea{resize:vertical;min-height:64px;line-height:1.5;}
.wf textarea.tall{min-height:100px;}
.wf textarea.note{font-style:italic;background:var(--gold-l);border-color:#E8D49A;}
.wf textarea.note:focus{border-color:var(--gold);}
.shot-list-w{display:flex;flex-direction:column;gap:5px;}
.shot-item-w{display:flex;gap:5px;align-items:center;}
.shot-item-w input{flex:1;}
.snum{font-family:'DM Mono',monospace;font-size:10px;color:var(--faint);width:14px;flex-shrink:0;text-align:right;}
.sdel{background:none;border:none;color:var(--faint);cursor:pointer;font-size:14px;line-height:1;padding:0 3px;}
.sdel:hover{color:var(--danger);}
.add-shot-w{font-size:12px;color:var(--faint);background:none;border:1px dashed var(--border);border-radius:var(--rs);padding:5px 9px;cursor:pointer;width:100%;text-align:left;font-family:'Instrument Sans',sans-serif;transition:all .15s;margin-top:2px;}
.add-shot-w:hover{color:var(--accent);border-color:var(--accent);background:var(--accent-l);}
.apply-btn{width:100%;margin-top:4px;}
.multi-select{position:relative;width:100%;}
.multi-select summary{list-style:none;width:100%;font-family:'Instrument Sans',sans-serif;font-size:13px;color:var(--text);background:var(--bg);border:1px solid var(--border);border-radius:var(--rs);padding:7px 30px 7px 9px;outline:none;cursor:pointer;min-height:34px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;position:relative;}
.multi-select summary::-webkit-details-marker{display:none;}
.multi-select summary:after{content:'⌄';position:absolute;right:9px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:13px;}
.multi-select[open] summary{border-color:var(--accent);background:var(--accent-l);}
.multi-menu{position:absolute;left:0;right:0;top:calc(100% + 4px);z-index:120;background:var(--surface);border:1px solid var(--border-strong);border-radius:var(--rs);box-shadow:0 10px 28px rgba(0,0,0,.13);padding:6px;display:flex;flex-direction:column;gap:2px;}
.multi-option{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--text);padding:6px 7px;border-radius:4px;cursor:pointer;}
.multi-option:hover{background:var(--bg);}
.multi-option input{width:auto;margin:0;accent-color:var(--accent);}
.multi-select.compact{width:auto;min-width:150px;max-width:100%;}
.multi-select.compact summary{font-size:11px;border-radius:20px;padding:3px 24px 3px 9px;min-height:24px;color:var(--muted);background:var(--surface);}
.multi-select.compact .multi-menu{min-width:180px;right:auto;}
.field-settings{display:flex;flex-direction:column;gap:8px;}
.settings-title{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);margin:8px 2px 0;}
.field-row-ctl{display:grid;grid-template-columns:auto minmax(0,1fr) 50px 50px auto;align-items:center;gap:6px;background:var(--surface-soft);border:1px solid var(--border);border-radius:var(--rs);padding:8px 9px;transition:border-color .15s,background .15s,box-shadow .15s;}
.field-name-input{width:100%;font-family:'Instrument Sans',sans-serif;font-size:12px;font-weight:600;color:var(--text);background:var(--surface);border:1px solid transparent;border-radius:5px;padding:5px 6px;outline:none;}
.field-name-input:focus{border-color:var(--accent);background:var(--accent-l);}
.field-ctl-actions{display:flex;gap:3px;align-items:center;justify-content:flex-end;}
.field-ctl-name{font-size:12px;font-weight:600;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.field-ctl-key{font-family:'DM Mono',monospace;font-size:9px;color:var(--faint);margin-top:1px;}
.field-check{display:flex;align-items:center;justify-content:center;gap:4px;font-size:10px;font-family:'DM Mono',monospace;color:var(--muted);text-transform:uppercase;}
.field-check input{width:auto;margin:0;accent-color:var(--accent);}
.field-add{border:1px dashed var(--border);border-radius:var(--rs);padding:10px;background:var(--surface);display:flex;flex-direction:column;gap:7px;}
.field-add-row{display:flex;gap:6px;}
.field-add-row input{flex:1;font-family:'Instrument Sans',sans-serif;font-size:13px;color:var(--text);background:var(--bg);border:1px solid var(--border);border-radius:var(--rs);padding:7px 9px;outline:none;}
.field-remove{color:var(--danger);border-color:#E8C0B0;background:var(--danger-l);}
.field-remove:hover{color:#fff;background:var(--danger);border-color:var(--danger);}
.viewer-setting{display:flex;align-items:center;justify-content:space-between;gap:10px;background:var(--surface-soft);border:1px solid var(--border);border-radius:var(--rs);padding:10px;}
.viewer-setting label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);}
.viewer-setting select,.viewer-setting input{font-family:'Instrument Sans',sans-serif;font-size:12px;color:var(--text);background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:7px 9px;outline:none;}
.viewer-setting input{width:96px;}
.viewer-setting select:focus,.viewer-setting input:focus{border-color:var(--accent);background:var(--accent-l);}
.setup-drag-handle{width:22px;height:30px;display:grid;grid-template-columns:repeat(2,3px);grid-auto-rows:3px;place-content:center;gap:3px;border:1px solid transparent;border-radius:5px;background:transparent;cursor:grab;flex-shrink:0;}
.setup-drag-handle span{width:3px;height:3px;border-radius:50%;background:var(--faint);display:block;}
.setup-drag-handle:hover,.setup-drag-handle:focus-visible{background:var(--accent-l);border-color:var(--accent);outline:none;}
.setup-drag-handle:active{cursor:grabbing;}
.setup-row-drag-over{border-color:var(--accent)!important;background:var(--accent-l)!important;box-shadow:inset 0 0 0 1px var(--accent);}
.is-dragging{opacity:.45;}
.option-row{display:flex;gap:6px;align-items:center;background:var(--bg);border:1px solid var(--border);border-radius:var(--rs);padding:7px 8px;transition:border-color .15s,background .15s,box-shadow .15s;}
.option-swatch{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.option-row input{flex:1;min-width:0;font-family:'Instrument Sans',sans-serif;font-size:12px;color:var(--text);background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:5px 7px;outline:none;}
.option-row input:focus{border-color:var(--accent);background:var(--accent-l);}

/* ── BOARD ── */
.board{flex:1;padding:24px 28px 88px;overflow-y:auto;min-width:0;}

/* ACT SECTION */
.act-block{margin-bottom:28px;}
.act-hdr{font-family:'DM Mono',monospace;font-size:10px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);padding-bottom:10px;border-bottom:1px solid var(--border);margin-bottom:14px;display:flex;align-items:center;gap:10px;}
.act-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.act-name-el{cursor:pointer;border-radius:3px;padding:1px 4px;margin:-1px -4px;}
.act-name-el:hover{background:var(--bg);}
.act-name-inp{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);border:1px solid var(--accent);background:var(--accent-l);border-radius:4px;padding:2px 6px;outline:none;}
.scene-grid{display:flex;flex-wrap:nowrap;gap:16px;align-items:flex-start;overflow-x:auto;overflow-y:hidden;padding:0 4px 10px 0;scrollbar-gutter:stable;}
.scene-grid::-webkit-scrollbar{height:7px;}
.scene-grid::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:999px;}

/* STORY VIEW */
.story-wrap{max-width:980px;margin:0 auto;display:flex;flex-direction:column;gap:18px;}
.story-overview{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;box-shadow:var(--shadow);}
.story-stat{display:flex;flex-direction:column;gap:2px;}
.story-stat strong{font-family:'DM Serif Display',serif;font-size:24px;line-height:1;color:var(--text);}
.story-stat span{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);}
.story-act{background:transparent;}
.story-list{display:flex;flex-direction:column;gap:8px;}
.story-row{display:grid;grid-template-columns:auto 86px minmax(0,1fr) auto;gap:12px;align-items:center;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:9px 12px;box-shadow:0 5px 18px rgba(38,48,32,.05);transition:border-color .15s,background .15s,box-shadow .15s;}
.story-row:hover{border-color:var(--border-strong);box-shadow:0 8px 24px rgba(38,48,32,.09);}
.story-row.hidden{display:none;}
.story-row.is-selected{border-color:var(--accent);background:var(--accent-l);}
.story-row.dragging{opacity:.45;}
.story-row.drag-over{border-color:var(--accent);box-shadow:0 0 0 3px rgba(42,92,63,.15);}
.story-left{display:flex;align-items:center;gap:9px;}
.story-check{width:16px;height:16px;accent-color:var(--accent);flex-shrink:0;}
.story-drag{width:18px;height:28px;display:grid;grid-template-columns:repeat(2,3px);gap:3px;place-content:center;cursor:grab;border-radius:5px;}
.story-drag span{width:3px;height:3px;border-radius:50%;background:var(--faint);}
.story-thumb{width:86px;aspect-ratio:16/9;border:1px solid var(--border);border-radius:var(--rs);background:var(--surface-soft);overflow:hidden;display:flex;align-items:center;justify-content:center;color:var(--faint);}
.story-thumb img,.story-thumb video{width:100%;height:100%;object-fit:cover;display:block;}
.story-thumb svg{opacity:.35;}
.story-main{min-width:0;}
.story-kicker{font-family:'DM Mono',monospace;font-size:10px;color:var(--faint);letter-spacing:.06em;margin-bottom:2px;}
.story-title{font-family:'DM Serif Display',serif;font-size:18px;line-height:1.15;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.story-shots{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:3px;}
.story-meta{display:flex;flex-direction:column;gap:5px;align-items:flex-end;min-width:150px;}
.story-meta .time-badge{cursor:default;}
.story-pills{display:flex;gap:4px;justify-content:flex-end;flex-wrap:wrap;}

/* ANIMATIC VIEW */
.animatic-wrap{max-width:1100px;margin:0 auto;display:flex;flex-direction:column;gap:16px;}
.animatic-player{background:#111817;border:1px solid #32413F;border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden;}
.animatic-screen{aspect-ratio:16/9;background:#101713;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.55);position:relative;max-height:58vh;}
.animatic-screen img,.animatic-screen video{width:100%;height:100%;object-fit:contain;background:#101713;}
.animatic-empty{font-family:'DM Mono',monospace;font-size:12px;letter-spacing:.08em;text-transform:uppercase;}
.animatic-caption{position:absolute;left:14px;bottom:12px;right:14px;background:rgba(0,0,0,.48);color:#fff;border-radius:var(--rs);padding:8px 10px;display:flex;justify-content:space-between;gap:10px;font-size:12px;}
.animatic-controls{display:grid;grid-template-columns:auto auto auto auto auto auto 1fr auto;gap:8px;align-items:center;padding:10px 12px;border-top:1px solid #273331;background:#1C2428;}
.animatic-controls input[type=range]{width:100%;accent-color:var(--accent);}
.animatic-time{font-family:'DM Mono',monospace;font-size:11px;color:#AAB8B2;min-width:88px;text-align:right;}
.animatic-zoom{display:flex;align-items:center;gap:5px;color:#AAB8B2;font-family:'DM Mono',monospace;font-size:10px;}
.animatic-zoom input{width:96px;}
.animatic-lanes{display:flex;flex-direction:column;gap:8px;}
.animatic-track{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;display:flex;align-items:center;gap:10px;}
.animatic-track strong{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);min-width:76px;}
.animatic-track-list{display:flex;gap:6px;flex-wrap:wrap;flex:1;}
.animatic-chip{font-size:11px;color:var(--muted);border:1px solid var(--border);background:var(--surface-soft);border-radius:999px;padding:4px 8px;}
.animatic-timeline{display:flex;flex-direction:column;gap:10px;}
.animatic-editor{background:#121817;border:1px solid #2D3938;border-radius:var(--r);overflow-x:auto;overflow-y:hidden;box-shadow:var(--shadow);scrollbar-width:none;}
.animatic-editor::-webkit-scrollbar{display:none;}
.animatic-ruler{position:relative;height:34px;background:#192123;border-bottom:1px solid #2D3938;overflow:visible;width:calc(92px + var(--timeline-w, 640px));padding-left:92px;}
.timeline-inner{position:relative;height:100%;min-width:100%;}
.ruler-mark{position:absolute;top:0;bottom:0;border-left:1px solid #3D4B4A;color:#AAB8B2;font-family:'DM Mono',monospace;font-size:10px;padding-left:4px;line-height:32px;}
.animatic-track-row{display:grid;grid-template-columns:92px var(--timeline-w, 640px);min-height:74px;border-bottom:1px solid #253130;width:calc(92px + var(--timeline-w, 640px));}
.animatic-track-row:last-child{border-bottom:0;}
.track-label{background:#20292D;color:#D6DEDA;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;display:flex;align-items:center;justify-content:center;border-right:1px solid #2D3938;}
.track-lane{position:relative;background:#101514;min-height:74px;overflow:visible;}
.scene-bracket{position:absolute;top:8px;height:20px;border:1px solid #415351;background:rgba(221,236,227,.08);border-radius:4px;color:#B8C7C1;font-family:'DM Mono',monospace;font-size:9px;padding:3px 5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.timeline-clip{position:absolute;top:8px;height:58px;border:1px solid #516463;border-radius:5px;background:#2A3537;overflow:hidden;box-shadow:0 3px 10px rgba(0,0,0,.25);cursor:pointer;}
.timeline-clip img,.timeline-clip video{width:100%;height:100%;object-fit:cover;display:block;pointer-events:none;}
.timeline-clip span{position:absolute;left:4px;right:4px;bottom:3px;background:rgba(0,0,0,.48);color:#fff;border-radius:3px;padding:1px 3px;font-family:'DM Mono',monospace;font-size:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;pointer-events:none;}
.clip-handle{position:absolute;top:0;bottom:0;width:12px;background:rgba(255,255,255,.18);z-index:4;pointer-events:auto;}
.clip-handle.left{left:0;cursor:w-resize;}
.clip-handle.right{right:0;cursor:e-resize;}
.timeline-playhead{position:absolute;top:0;bottom:0;width:2px;background:#E64B3C;z-index:8;box-shadow:0 0 0 1px rgba(230,75,60,.2);pointer-events:none;}
.animatic-act .act-hdr{margin-bottom:10px;}
.animatic-slot{display:grid;grid-template-columns:minmax(124px,220px) minmax(0,1fr) 180px;gap:12px;align-items:center;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;box-shadow:0 5px 18px rgba(38,48,32,.05);}
.animatic-slot.hidden{display:none;}
.animatic-slot.active{border-color:var(--accent);background:var(--accent-l);}
.animatic-slot-media{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding:1px;}
.animatic-slot-media::-webkit-scrollbar{display:none;}
.animatic-mini{width:54px;aspect-ratio:16/9;border-radius:5px;border:1px solid var(--border);background:var(--surface-soft);overflow:hidden;flex:0 0 54px;display:flex;align-items:center;justify-content:center;color:var(--faint);position:relative;cursor:pointer;}
.animatic-mini img,.animatic-mini video{width:100%;height:100%;object-fit:cover;}
.animatic-mini.off{opacity:.42;}
.animatic-mini-check{position:absolute;top:3px;left:3px;background:rgba(255,255,255,.94);border:1px solid rgba(0,0,0,.18);border-radius:4px;width:16px;height:16px;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 6px rgba(0,0,0,.12);}
.animatic-mini-check input{width:12px;height:12px;margin:0;accent-color:var(--accent);}
.animatic-slot-main{min-width:0;}
.animatic-slot-title{font-family:'DM Serif Display',serif;font-size:18px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.animatic-slot-meta{font-family:'DM Mono',monospace;font-size:10px;color:var(--faint);letter-spacing:.06em;margin-top:2px;}
.animatic-edit{display:flex;gap:6px;align-items:center;justify-content:flex-end;}
.animatic-edit input{width:72px;font-family:'DM Mono',monospace;font-size:11px;color:var(--text);background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:6px;outline:none;text-align:center;}
.animatic-edit input:focus{border-color:var(--accent);background:var(--accent-l);}
.add-scene-card{width:46px;height:46px;border:1.5px dashed var(--border-strong);border-radius:999px;background:var(--surface);color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:'Instrument Sans',sans-serif;transition:all .15s;flex:0 0 46px;align-self:center;box-shadow:0 6px 18px rgba(38,48,32,.05);}
.add-scene-card svg{width:20px;height:20px;}
.add-scene-card span{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0);white-space:nowrap;}
.add-scene-card:hover{border-color:var(--accent);background:var(--accent-l);color:var(--accent);transform:translateY(-1px);}
.add-act-row{display:flex;justify-content:center;margin:6px 0 20px;}
.add-act-btn{display:flex;align-items:center;gap:6px;padding:7px 18px;background:var(--surface);border:1.5px dashed var(--border);border-radius:var(--r);font-size:12px;color:var(--faint);cursor:pointer;font-family:'Instrument Sans',sans-serif;transition:all .15s;}
.add-act-btn:hover{border-color:var(--gold);color:var(--gold);background:var(--gold-l);}

/* ── SCENE CARD ── */
.scene-card{width:var(--card-w);height:var(--card-h);min-height:560px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;transition:box-shadow .2s,border-color .2s,transform .2s;position:relative;box-shadow:var(--shadow);display:flex;flex-direction:column;flex:0 0 var(--card-w);}
.scene-card:hover{border-color:var(--border-strong);box-shadow:0 14px 36px rgba(38,48,32,.13);transform:translateY(-1px);}
.scene-card.dropdown-open{z-index:80;overflow:visible;}
.scene-card.dragging{opacity:.35;border:2px dashed var(--accent);}
.scene-card.drag-over{border:2px solid var(--accent);box-shadow:0 0 0 3px rgba(42,92,63,.15);}
.scene-card.hidden{display:none;}
.scene-card.is-selected{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-l),var(--shadow);}
.scene-select{position:absolute;left:9px;top:9px;z-index:30;width:20px;height:20px;border:1px solid var(--border-strong);border-radius:5px;background:rgba(255,255,255,.92);display:flex;align-items:center;justify-content:center;box-shadow:0 3px 10px rgba(0,0,0,.08);}
.scene-select input{width:14px;height:14px;margin:0;accent-color:var(--accent);}

/* Drag handle */
.drag-hdl{position:absolute;top:0;left:0;right:0;height:18px;display:flex;align-items:center;justify-content:center;cursor:grab;z-index:10;opacity:0;transition:opacity .15s;}
.drag-hdl:active{cursor:grabbing;}
.scene-card:hover .drag-hdl{opacity:1;}
.dhdots{display:flex;gap:3px;}
.dhdot{width:3px;height:3px;border-radius:50%;background:var(--faint);}

/* SWIPER */
.swiper{width:100%;aspect-ratio:var(--viewer-ratio);background:#EEF1EA;border-bottom:1px solid var(--border);position:relative;overflow:hidden;flex:0 0 auto;}
body.viewer-portrait .swiper{width:min(54%,250px);aspect-ratio:9/16;margin:0 auto;border-left:1px solid var(--border);border-right:1px solid var(--border);}
body.viewer-portrait .thumb-strip{justify-content:center;}
.swiper.dov{background:var(--accent-l);border:2px dashed var(--accent);}
.sw-track{display:flex;height:100%;transition:transform .28s cubic-bezier(.4,0,.2,1);}
.sw-slide{min-width:100%;height:100%;position:relative;flex-shrink:0;}
.sw-slide img,.sw-slide video{width:100%;height:100%;object-fit:cover;display:block;cursor:zoom-in;}
.sw-empty{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:7px;color:var(--faint);cursor:pointer;transition:background .15s;}
.sw-empty:hover,.swiper.dov .sw-empty{background:#dff0e8;}
.sw-empty svg{opacity:.3;}
.sw-empty span{font-size:11px;font-family:'DM Mono',monospace;}
.sw-prev,.sw-next{position:absolute;top:50%;transform:translateY(-50%);background:rgba(253,251,247,.9);border:1px solid var(--border);border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:10;font-size:14px;color:var(--text);transition:all .15s;opacity:0;}
.sw-prev{left:7px;}.sw-next{right:7px;}
.swiper:hover .sw-prev,.swiper:hover .sw-next{opacity:1;}
.sw-prev.h,.sw-next.h{display:none;}
.sw-dots{position:absolute;bottom:6px;left:50%;transform:translateX(-50%);display:flex;gap:4px;z-index:10;}
.sw-dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.5);cursor:pointer;transition:all .15s;}
.sw-dot.active{background:#fff;width:12px;border-radius:3px;}
.sw-overlay{position:absolute;top:7px;right:7px;display:flex;gap:3px;z-index:10;opacity:0;transition:opacity .15s;}
.swiper:hover .sw-overlay{opacity:1;}
.sw-cnt{position:absolute;top:7px;left:7px;background:rgba(0,0,0,.45);color:#fff;border-radius:4px;padding:2px 6px;font-size:10px;font-family:'DM Mono',monospace;display:none;}
.mo{background:rgba(0,0,0,.5);color:#fff;border:none;border-radius:4px;padding:3px 7px;font-size:11px;cursor:pointer;font-family:'DM Mono',monospace;}
.mo:hover{background:rgba(0,0,0,.8);}
.mo.danger{background:rgba(196,74,42,.8);}
.mo.danger:hover{background:rgba(196,74,42,1);}
.thumb-strip{display:flex;gap:7px;overflow-x:auto;padding:8px 10px;background:var(--surface-soft);border-bottom:1px solid var(--border);scrollbar-width:thin;}
.thumb-strip::-webkit-scrollbar{height:4px;}
.thumb-strip::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.thumb-item{width:76px;height:50px;border:1px solid var(--border);border-radius:7px;overflow:hidden;background:#E6ECE2;cursor:pointer;padding:0;position:relative;flex:0 0 auto;opacity:.72;transition:opacity .15s,border-color .15s,box-shadow .15s,transform .15s;}
.thumb-item:hover{opacity:1;transform:translateY(-1px);}
.thumb-item.active{opacity:1;border-color:var(--accent);box-shadow:0 0 0 2px rgba(23,74,54,.18);}
.thumb-item img,.thumb-item video{width:100%;height:100%;object-fit:cover;display:block;}
.thumb-placeholder{cursor:default;display:flex;align-items:center;justify-content:center;color:var(--faint);opacity:.5;}
.thumb-placeholder:hover{opacity:.5;transform:none;}
.thumb-play{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.18);color:#fff;font-size:12px;}

/* CARD BODY */
.card-body{padding:14px;flex:1;min-height:0;overflow-y:auto;scrollbar-gutter:stable;}

/* Field rows */
.field-row{display:flex;align-items:flex-start;gap:8px;margin-bottom:7px;}
.field-row:last-child{margin-bottom:0;}
.field-icon{width:14px;height:14px;flex-shrink:0;margin-top:2px;opacity:.45;}
.field-content{flex:1;min-width:0;}
.field-label{font-size:9px;font-family:'DM Mono',monospace;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);margin-bottom:2px;}
.field-value{font-size:12px;color:var(--text);line-height:1.5;}
.field-value.italic{font-style:italic;color:var(--muted);}
.field-value.pre{white-space:pre-line;}
.field-value.muted{color:var(--muted);}

/* Editable fields */
.editable{cursor:pointer;border-radius:3px;padding:1px 3px;margin:-1px -3px;transition:background .1s;}
.editable:hover{background:var(--bg);}

/* Title row */
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:7px;margin-bottom:9px;}
.scene-meta{flex:1;min-width:0;}
.scene-num{font-family:'DM Mono',monospace;font-size:10px;color:var(--faint);letter-spacing:.05em;margin-bottom:2px;}
.scene-title{font-family:'DM Serif Display',serif;font-size:17px;line-height:1.25;color:var(--text);cursor:pointer;border-radius:3px;padding:1px 3px;margin:-1px -3px;}
.scene-title:hover{background:var(--bg);}
.scene-title-inp{font-family:'DM Serif Display',serif;font-size:15px;color:var(--text);border:1px solid var(--accent);background:var(--accent-l);border-radius:4px;padding:2px 6px;width:100%;outline:none;}
.time-badge{font-family:'DM Mono',monospace;font-size:11px;background:var(--gold-l);color:var(--gold);border:1px solid #E8D49A;padding:3px 7px;border-radius:var(--rs);white-space:nowrap;flex-shrink:0;cursor:pointer;}
.time-badge:hover{background:#F5EAC0;}
.time-controls{display:flex;align-items:center;justify-content:flex-end;gap:4px;flex-shrink:0;flex-wrap:wrap;}
.time-btn{width:24px;height:24px;border:1px solid var(--border);border-radius:50%;background:var(--surface);color:var(--faint);display:flex;align-items:center;justify-content:center;cursor:pointer;padding:0;transition:all .15s;}
.time-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-l);}
.time-btn.active{border-color:var(--accent);color:#fff;background:var(--accent);}
.time-btn svg{width:13px;height:13px;}
.section-clock{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);background:var(--surface-soft);border:1px solid var(--border);border-radius:999px;padding:2px 6px;min-width:42px;text-align:center;}
.time-inp{font-family:'DM Mono',monospace;font-size:11px;background:var(--gold-l);color:var(--gold);border:1px solid #E8D49A;padding:3px 6px;border-radius:var(--rs);width:108px;outline:none;text-align:center;}

/* Pills row */
.pills-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:9px;}
.pill{display:inline-flex;align-items:center;gap:3px;font-size:11px;padding:2px 8px;border-radius:20px;border:1px solid var(--border);color:var(--muted);cursor:pointer;transition:all .15s;font-family:'Instrument Sans',sans-serif;}
.pill svg{width:8px;height:8px;opacity:.5;}
.pill:hover{border-color:var(--border-strong);}
.pill-sel-inline{font-size:11px;border:1px solid var(--border);border-radius:20px;padding:2px 8px;color:var(--muted);background:var(--surface);outline:none;cursor:pointer;font-family:'Instrument Sans',sans-serif;}

/* Collapsible sections */
.section{margin-bottom:9px;}
.section-hdr{display:flex;align-items:center;gap:6px;cursor:pointer;user-select:none;margin-bottom:4px;}
.section-hdr:hover .slabel{color:var(--muted);}
.slabel{font-size:10px;font-family:'DM Mono',monospace;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);transition:color .15s;}
.chevron{font-size:9px;color:var(--faint);transition:transform .15s;margin-left:auto;}
.chevron.open{transform:rotate(90deg);}
.section-body{overflow:hidden;}
.section-body.collapsed{display:none;}

/* Lyrics */
.lyrics-block{font-size:12px;font-style:italic;color:var(--muted);line-height:1.6;background:var(--surface-soft);border-radius:var(--rs);padding:7px 9px;cursor:pointer;border:1px solid transparent;white-space:pre-line;min-height:26px;}
.lyrics-block:hover{border-color:var(--border);}
.lyrics-ta{font-size:12px;font-style:italic;color:var(--muted);line-height:1.6;background:var(--accent-l);border:1px solid var(--accent);border-radius:var(--rs);padding:6px 9px;width:100%;resize:vertical;outline:none;min-height:56px;font-family:'Instrument Sans',sans-serif;}

/* Shots */
.shot-list{display:flex;flex-direction:column;gap:3px;}
.shot-row{display:flex;gap:6px;align-items:flex-start;font-size:12px;color:var(--text);line-height:1.5;}
.shot-dot{width:5px;height:5px;border-radius:50%;background:var(--accent);margin-top:6px;flex-shrink:0;}
.shot-txt{flex:1;cursor:pointer;}
.shot-txt:hover{color:var(--accent);}
.shot-inp{flex:1;font-size:12px;border:1px solid var(--accent);border-radius:4px;padding:2px 6px;background:var(--accent-l);outline:none;font-family:'Instrument Sans',sans-serif;}
.shot-x{background:none;border:none;cursor:pointer;color:var(--faint);font-size:12px;line-height:1;padding:0 2px;flex-shrink:0;opacity:0;transition:opacity .15s;}
.shot-row:hover .shot-x{opacity:1;}
.shot-x:hover{color:var(--danger);}
.add-shot-c{font-size:11px;color:var(--faint);background:none;border:1px dashed var(--border);border-radius:var(--rs);padding:4px 9px;cursor:pointer;width:100%;text-align:left;font-family:'Instrument Sans',sans-serif;transition:all .15s;margin-top:4px;}
.add-shot-c:hover{color:var(--accent);border-color:var(--accent);background:var(--accent-l);}

/* Note */
.note-block{font-size:12px;color:var(--muted);line-height:1.5;background:var(--gold-l);border:1px solid #E8D49A;border-left:3px solid var(--gold);border-radius:var(--rs);padding:6px 9px;cursor:pointer;min-height:24px;font-style:italic;}
.note-block:hover{background:#F5EAC0;}
.note-ta{font-size:12px;color:var(--muted);line-height:1.5;background:var(--gold-l);border:1px solid var(--gold);border-left:3px solid var(--gold);border-radius:var(--rs);padding:6px 9px;width:100%;resize:vertical;outline:none;min-height:50px;font-family:'Instrument Sans',sans-serif;font-style:italic;}

/* Props */
.props-block{font-size:12px;color:var(--muted);line-height:1.5;background:var(--bg);border:1px solid transparent;border-radius:var(--rs);padding:5px 8px;cursor:pointer;min-height:22px;}
.props-block:hover{border-color:var(--border);}
.props-ta{font-size:12px;color:var(--muted);line-height:1.5;background:var(--accent-l);border:1px solid var(--accent);border-radius:var(--rs);padding:5px 8px;width:100%;resize:vertical;outline:none;min-height:42px;font-family:'Instrument Sans',sans-serif;}

/* CARD FOOTER */
.card-footer{padding:7px 12px;border-top:1px solid var(--border);display:flex;gap:5px;align-items:center;justify-content:flex-end;background:var(--bg);flex-shrink:0;}
.card-edit-btn,.card-del-btn{font-size:11px;color:var(--faint);background:none;border:1px solid transparent;border-radius:4px;padding:3px 7px;cursor:pointer;font-family:'Instrument Sans',sans-serif;}
.card-edit-btn:hover{border-color:var(--border);color:var(--accent);background:var(--accent-l);}
.card-del-btn:hover{color:var(--danger);border-color:#E8C0B0;background:var(--danger-l);}

/* LIGHTBOX */
.lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:1000;align-items:center;justify-content:center;flex-direction:column;}
.lightbox.open{display:flex;}
.lb-media{max-width:90vw;max-height:85vh;border-radius:8px;object-fit:contain;}
.lb-close{position:absolute;top:20px;right:24px;background:none;border:none;color:#fff;font-size:28px;cursor:pointer;opacity:.7;line-height:1;}
.lb-close:hover{opacity:1;}
.lb-nav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.15);border:none;color:#fff;font-size:28px;width:48px;height:48px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.lb-nav:hover{background:rgba(255,255,255,.25);}
.lb-prev{left:20px;}.lb-next{right:20px;}
.lb-counter{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.6);font-family:'DM Mono',monospace;font-size:12px;}
.lb-caption{position:absolute;bottom:42px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.45);font-size:12px;font-family:'DM Mono',monospace;white-space:nowrap;}

/* NO RESULTS */
.no-results{text-align:center;padding:60px 20px;color:var(--faint);font-family:'DM Mono',monospace;font-size:13px;}

/* TOAST */
.toast{position:fixed;bottom:20px;right:20px;background:var(--accent);color:#fff;padding:9px 16px;border-radius:var(--rs);font-size:13px;font-weight:500;z-index:999;opacity:0;transform:translateY(8px);transition:all .2s;pointer-events:none;}
.toast.show{opacity:1;transform:translateY(0);}

.hf{display:none;}

@media (max-width:800px){
  :root{--panel:100%;}
  .hdr,.toolbar{position:static;padding-left:14px;padding-right:14px;}
  .hdr{align-items:flex-start;}
  .hdr-brand{flex-wrap:wrap;}
  .toolbar{gap:7px;}
  .toolbar .divider{display:none;}
  .sort-group{margin-left:0;overflow-x:auto;max-width:100%;padding-bottom:2px;}
  .search-wrap input,.search-wrap input:focus{width:160px;max-width:calc(100vw - 40px);}
  .layout{display:block;min-height:0;}
  .write-panel{position:relative;top:auto;width:100%;min-width:0;height:auto;border-right:0;border-bottom:1px solid var(--border);}
  .write-panel.collapsed{display:none;width:100%;min-width:0;}
  .panel-rail,body.panel-closed .panel-rail{top:auto;bottom:14px;left:14px;transform:none;writing-mode:horizontal-tb;border-radius:999px;border:1px solid var(--accent);padding:9px 13px;}
  .panel-body{max-height:none;overflow:visible;}
  .board{padding:16px 14px 72px;}
  :root{--card-w:calc(100vw - 28px);--card-h:640px;}
  .scene-grid{display:flex;}
  .chat-config{grid-template-columns:1fr 84px;}
  .scene-card{width:var(--card-w);min-width:0;height:var(--card-h);min-height:560px;flex-basis:var(--card-w);}
  .story-overview{grid-template-columns:repeat(2,minmax(0,1fr));}
  .story-row{grid-template-columns:auto 72px minmax(0,1fr);align-items:start;}
  .story-thumb{width:72px;}
  .story-meta{grid-column:2/4;align-items:flex-start;min-width:0;}
  .animatic-controls{grid-template-columns:1fr;align-items:stretch;}
  .animatic-time{text-align:left;}
  .animatic-slot{grid-template-columns:1fr;align-items:start;}
  .animatic-edit{justify-content:flex-start;}
  .add-scene-card{width:44px;height:44px;flex-basis:44px;margin:0 auto;}
  .card-footer{flex-wrap:wrap;}
}

@media print{
  .hdr,.toolbar,.write-panel,.card-footer,.drag-hdl,.sw-overlay,.sw-prev,.sw-next,.sw-dots,.sw-cnt,.thumb-strip,.add-scene-card,.add-act-row,.toast,.lightbox{display:none!important;}
  .layout{display:block;}.board{padding:0;}
  .scene-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .scene-card{height:auto;min-height:0;border:1px solid #ccc;break-inside:avoid;}
  .card-body{overflow:visible;}
  .sw-track{transform:none!important;}.sw-slide:not(:first-child){display:none;}
  .section-body.collapsed{display:block!important;}
  @page{size:A4 landscape;margin:12mm;}
}

<script>
const LOCS=['Outside courtroom','Courtroom set','Central Avenue','Park','Eye doctor office','Boat','Assorted / montage','Other'];
const LOC_COLORS={'Outside courtroom':'#534AB7','Courtroom set':'#534AB7','Central Avenue':'#085041','Park':'#633806','Eye doctor office':'#0C447C','Boat':'#712B13','Assorted / montage':'#444441','Other':'#888'};
const DEFAULT_ACTS=['Act 1 — Courtroom','Act 2 — Central Avenue','Act 3 — Park','Act 4 — Eye doctor','Act 5 — Boat + Finale'];
const DEFAULT_LOCS=[...LOCS];
const DEFAULT_STATUSES=['Not shot','Scheduled','Shot ✓','Locked'];
const STATUS_COLORS={'Not shot':'#B0A898','Scheduled':'#C4952A','Shot ✓':'#2A5C3F','Locked':'#7A5C3F'};
const REMOVED_FIELD_KEYS=['locationDetail'];
const DEFAULT_CAMS=['Cam A — Moti','Cam B — Elmelech','Both','BTS'];
const FIELD_DEFAULTS=[
  {key:'lyrics',label:'Lyrics',visible:true,defaultOpen:true,kind:'lyrics'},
  {key:'shots',label:'Key shots',visible:true,defaultOpen:true,kind:'shots'},
  {key:'note',label:"Director's note",visible:true,defaultOpen:true,kind:'note'},
  {key:'extras',label:'Extras',visible:true,defaultOpen:false,kind:'text'},
  {key:'wardrobe',label:'Wardrobe',visible:true,defaultOpen:false,kind:'text'},
  {key:'props',label:'Props',visible:true,defaultOpen:false,kind:'text'}
];

const INIT=[
  {id:1,act:'Act 1 — Courtroom',num:'1',title:'Intro',time:'0:00 – 0:05',location:'Outside courtroom',status:'Not shot',lyrics:'Instrumental only',shots:['Slow push into courthouse doors — boys in suits outside','Low angle: polished shoes, Kedushas Levi sefer under arm','One boy straightens tie — they push open the doors'],note:'Cold open. Establish the world before any lyrics hit.',props:'Suits, Kedushas Levi sefer',camera:['Cam A — Moti'],media:[]},
  {id:2,act:'Act 1 — Courtroom',num:'2–3',title:'Low verse 1A + 1B',time:'0:06 – 0:31',location:'Courtroom set',status:'Not shot',lyrics:"Like Reb Levi Yitzchak, I'm gonna love you\nLike Reb Levi Yitzchak, I'm gonna defend you\nLike Reb Levi Yitzchak, I'll only see the good in you\nLike Reb Levi Yitzchak, gonna love every Jew",shots:['Wide: accuser boy points dramatically at defendant','MCU: Barditchever boy rises, places sefer on bench','He points at defendant and SMILES — thumbs up','Jury boys: look at each other → nod → clapping','Defendant: nervous → relieved → beaming','Gavel bang — case closed'],note:'Deadpan = comedy. Shoot 1A and 1B in same setup.',props:'Suits, Kedushas Levi sefer, gavel (toy/improvised)',camera:['Both'],media:[]},
  {id:3,act:'Act 2 — Central Avenue',num:'4–5',title:'High chorus 1A + 1B',time:'0:31 – 0:55',location:'Central Avenue',status:'Not shot',lyrics:"It's gonna be the little Barditchevers\nThe little, little, Barditchevers\nWe've gotta be little Barditchevers\nTo make Moshiach come",shots:['Boys burst out courthouse in summer t-shirts — scooters appear','Wide: full group riding toward camera down Central Ave','Boy slaps positive "ticket" on windshield — driver grins','Boy stickers a stranger — stranger reads, laughs','Sticker on baby carriage — parent lights up'],note:'Music video energy. Wide-open lens, bright summer bokeh.',props:'Summer t-shirts, scooters/skateboards, stickers (designed + printed), positive tickets',camera:['Both'],media:[]},
  {id:4,act:'Act 2 — Central Avenue',num:'6',title:'Bridge 1 — transition',time:'0:55 – 1:01',location:'Park',status:'Not shot',lyrics:'Instrumental break',shots:['Boys skid to stop at park entrance','One boy spots lone yid on bench — nudges friend','Both boys grin — they\'ve got a plan'],note:'6 seconds only. 3 shots max.',props:'Scooters',camera:['Cam A — Moti'],media:[]},
  {id:5,act:'Act 3 — Park',num:'7',title:'Low verse 2A',time:'1:02 – 1:14',location:'Park',status:'Not shot',lyrics:"Like Reb Levi Yitzchak, I'm gonna love you\nLike Reb Levi Yitzchak, I'm gonna defend you\nLike Reb Levi Yitzchak, I'll only see the good in you\nLike Reb Levi Yitzchak, gonna love every Jew",shots:['Boy holds up giant framed portrait of yid next to his face','Yid: confused → sees himself celebrated → laughs','Boys gather around pointing at him like he\'s famous','Cam B wide: the full absurd scene'],note:'KEY PROP: oversized framed portrait. Big, funny, reads instantly.',props:'Oversized framed portrait (pre-printed)',camera:['Both'],media:[]},
  {id:6,act:'Act 3 — Park',num:'8',title:'High chorus 2A — horns',time:'1:14 – 1:27',location:'Park',status:'Not shot',lyrics:"It's gonna be the little Barditchevers\nThe little, little, little Barditchevers\nIt's gonna be the little Barditchevers\nTo make Moshiach come",shots:['Horn players emerge from behind bush — yid jumps','Full celebration erupts around the yid','Yid: stunned → amused → fully dancing','Handheld run-and-gun through the crowd'],note:'Horns = visual surprise. The yid joining in is the payoff.',props:'Horn players + instruments',camera:['Both'],media:[]},
  {id:7,act:'Act 3 — Park',num:'9',title:'High chorus 2B',time:'1:27 – 1:40',location:'Park',status:'Not shot',lyrics:"It's gonna be the little Barditchevers\nThe little, little, little Barditchevers\nWe've gotta be the little Barditchevers\nTo bring Moshiach now",shots:['Same bit with fresh extras — each surprised then delighted','Stickers passed person to person down a line','Fast cuts: 5–6 quick positive encounters'],note:'Cut fast. Each encounter 2–3 shots.',props:'Stickers, extras',camera:['Both'],media:[]},
  {id:8,act:'Act 4 — Eye doctor',num:'10–13',title:'Bridge 2A–2D',time:'1:40 – 2:04',location:'Eye doctor office',status:'Not shot',lyrics:"So put on those glasses and listen to me\nThere's so much good if you like you shall see\nAhavas chinam is free\nDefending our brothers always worth the fight\nYou can see clearly now",shots:['Boy in exam chair — doctor slides lenses in front of his eyes','Custom eye chart: KIND / GENEROUS / TZADDIK / GOOD','Boy puts on big glasses → face transforms to pure wonder','Final: walks out into sun, squints → eyes wide → smiles'],note:'KEY PROP: custom eye chart — print large. Visual gag anchor.',props:'Optometrist chair, novelty glasses, custom eye chart (print large)',camera:['Cam A — Moti'],media:[]},
  {id:9,act:'Act 5 — Boat + Finale',num:'14–15',title:'Transition to boat',time:'1:59 – 2:08',location:'Boat',status:'Not shot',lyrics:'Yeah Yeah. Yes we gotta be.',shots:['Boy walks out of eye doctor into bright sun — looks toward water','Hard cut: bow of boat cutting through water','Quick glimpse: boys on deck, arms out'],note:'Smash cut energy. 3 shots max.',props:'Boat confirmed?',camera:['Cam A — Moti'],media:[]},
  {id:10,act:'Act 5 — Boat + Finale',num:'16–19',title:'High chorus 3A–3C — finale',time:'2:08 – 2:45',location:'Boat',status:'Not shot',lyrics:"We gotta be the little Barditchevers\nWe want to be the little Barditchevers\nSo let's all sing together as Barditchevers\nAnd bring Moshiach now\nIt's time to be the Little Barditchevers\nSo let's all sing together\nAnd bring Moshiach now",shots:['Boat wide: full choir, water + golden sky — late afternoon','Tracking shot walking the full line','Tight faces: joy, arms around each other, dancing','Montage: massive sticker wall — final sticker added','Montage: chalk mural on sidewalk, pull back reveal','FINAL: all boys on bow, arms out, golden light — hold on it'],note:'Intercut boat + montage. Shoot boat like a concert. Chase golden hour.',props:"Chalk, sticker wall, flowers, 'You're awesome' wall pre-built",camera:['Both'],media:[]}
];

function defaultMasterLyrics(){
  return INIT.map(scene=>scene.lyrics||'')
    .filter(text=>text&&!/^instrumental/i.test(text))
    .join('\n\n');
}

let scenes=restoreMissingStarterLyrics(loadScenes());
let fieldSettings=loadFieldSettings();
let acts=loadOptionList('jdb_acts',DEFAULT_ACTS);
let locations=loadOptionList('jdb_locations',DEFAULT_LOCS);
let statuses=loadOptionList('jdb_statuses',DEFAULT_STATUSES);
let cameras=loadOptionList('jdb_cameras',DEFAULT_CAMS);
let viewerRatio=loadViewerRatio();
let cardHeight=loadCardHeight();
let panelOpen=true;
let activeTab='agent';
let boardView='cards';
let sortField='scene';let sortDir=1;
let compose=blankCompose();
let lbMedia=[];let lbIdx=0;
let dragId=null;
let storyDragId=null;
let setupDrag=null;
let swiperControllers=new Map();
let currentPlaybackSceneId=null;
let currentPlaybackStart=null;
let songInfo=loadSongInfo();
let selectedSceneIds=new Set();
let chatMessages=[{role:'assistant',text:'Board ready.'}];
let claudeMessages=[{role:'assistant',text:'Claude board chat ready.'}];
let activeAgentProvider=loadAgentProvider();
let animaticAudioTracks=[];
let animaticLoop=false;
let animaticZoom=8;
syncOptionsFromScenes();
applyViewerRatio();
applyCardHeight();

function withoutTransientMedia(list){
  return list.map(scene=>({...scene,media:(scene.media||[]).filter(m=>!m.transient&&!String(m.url||'').startsWith('blob:'))}));
}
function loadScenes(){
  try{
    const s=localStorage.getItem('jdb_v4');
    if(s){
      const p=JSON.parse(s);
      if(p&&p.length)return mergeStarterScenes(withoutTransientMedia(p));
    }
  }catch(e){}
  return JSON.parse(JSON.stringify(INIT));
}
function mergeStarterScenes(list){
  const byId=new Set(list.map(s=>s.id));
  const byTitle=new Set(list.map(s=>(s.act||'')+'|'+(s.title||'')));
  const repaired=[...list];
  INIT.forEach(scene=>{
    const sig=scene.act+'|'+scene.title;
    if(!byId.has(scene.id)&&!byTitle.has(sig))repaired.push(JSON.parse(JSON.stringify(scene)));
  });
  return repaired;
}
function restoreMissingStarterLyrics(list){
  let changed=false;
  const restored=list.map(scene=>{
    if(String(scene.lyrics||'').trim())return scene;
    const starter=INIT.find(item=>item.id===scene.id)||INIT.find(item=>item.act===scene.act&&item.title===scene.title);
    if(starter&&starter.lyrics){changed=true;return {...scene,lyrics:starter.lyrics};}
    return scene;
  });
  if(changed)setTimeout(save,0);
  return restored;
}
function save(){
  localStorage.setItem('jdb_localAt',String(Date.now()));
  try{
    localStorage.setItem('jdb_v4',JSON.stringify(scenes));
  }catch(e){
    localStorage.setItem('jdb_v4',JSON.stringify(withoutTransientMedia(scenes)));
    toast('Saved board text; large media is preview-only');
  }
}
function loadFieldSettings(){
  let stored=[];
  try{
    const raw=localStorage.getItem('jdb_field_settings');
    if(raw)stored=JSON.parse(raw)||[];
  }catch(e){}
  stored=stored.filter(f=>!REMOVED_FIELD_KEYS.includes(f.key));
  if(stored.length)return stored.map(f=>({...f,kind:f.kind||'text'}));
  return FIELD_DEFAULTS.map(def=>({...def}));
}
function saveFieldSettings(){localStorage.setItem('jdb_field_settings',JSON.stringify(fieldSettings));}
function loadOptionList(key,defaults){
  try{
    const raw=localStorage.getItem(key);
    if(raw){
      const parsed=JSON.parse(raw);
      if(Array.isArray(parsed)&&parsed.length)return parsed.filter(Boolean);
    }
  }catch(e){}
  return [...defaults];
}
function loadViewerRatio(){
  const saved=localStorage.getItem('jdb_viewer_ratio');
  return saved==='9:16'?'9:16':'16:9';
}
function saveViewerRatio(value){
  viewerRatio=value==='9:16'?'9:16':'16:9';
  localStorage.setItem('jdb_viewer_ratio',viewerRatio);
  applyViewerRatio();
}
function applyViewerRatio(){
  document.documentElement.style.setProperty('--viewer-ratio',viewerRatio==='9:16'?'9/16':'16/9');
  document.body.classList.toggle('viewer-portrait',viewerRatio==='9:16');
}
function loadCardHeight(){
  const saved=parseInt(localStorage.getItem('jdb_card_height'),10);
  return Number.isFinite(saved)?Math.max(520,Math.min(960,saved)):640;
}
function saveCardHeight(value){
  const next=parseInt(value,10);
  cardHeight=Number.isFinite(next)?Math.max(520,Math.min(960,next)):640;
  localStorage.setItem('jdb_card_height',String(cardHeight));
  applyCardHeight();
}
function applyCardHeight(){
  document.documentElement.style.setProperty('--card-h',cardHeight+'px');
}
function loadSongInfo(){
  const fallback={title:'Little Barditchevers',artist:'TYH',lyrics:defaultMasterLyrics()};
  try{
    const info=JSON.parse(localStorage.getItem('jdb_song_info')||'{}')||{};
    if(!String(info.lyrics||'').trim())info.lyrics=fallback.lyrics;
    if(!info.title)info.title=fallback.title;
    if(!info.artist)info.artist=fallback.artist;
    return info;
  }catch(e){return fallback;}
}
function saveSongInfo(){
  localStorage.setItem('jdb_song_info',JSON.stringify(songInfo));
}
function getElevenLabsKey(){return sessionStorage.getItem('jdb_elevenlabs_key')||'';}
function setElevenLabsKey(value){
  const v=String(value||'').trim();
  if(v)sessionStorage.setItem('jdb_elevenlabs_key',v);
  else sessionStorage.removeItem('jdb_elevenlabs_key');
}
function saveOptionLists(){
  localStorage.setItem('jdb_acts',JSON.stringify(acts));
  localStorage.setItem('jdb_locations',JSON.stringify(locations));
  localStorage.setItem('jdb_statuses',JSON.stringify(statuses));
  localStorage.setItem('jdb_cameras',JSON.stringify(cameras));
}
function uniqueList(values){return [...new Set(values.map(v=>String(v||'').trim()).filter(Boolean))];}
function syncOptionsFromScenes(){
  acts=uniqueList([...acts,...scenes.map(s=>s.act)]);
  locations=uniqueList([...locations,...scenes.map(s=>s.location)]);

function loadLyricsAudioFile(file){

async function transcribeSongFile(button,lyricsEl){
  const file=window.jdbSongFile;
  const key=getElevenLabsKey();
  if(!file){toast('Upload a song file first');return;}
  if(!key){toast('Add ElevenLabs API key in Music tab first');return;}
  const original=button.textContent;
  button.disabled=true;button.textContent='Transcribing...';
  try{
    const form=new FormData();
    form.append('model_id','scribe_v2');
    form.append('file',file,file.name);
    const response=await fetch('https://api.elevenlabs.io/v1/speech-to-text',{method:'POST',headers:{'xi-api-key':key},body:form});
    if(!response.ok){
      let detail='';
      try{const err=await response.json();detail=err.error?.message||'';}catch(e){}
      toast('Transcription failed '+response.status+(detail?': '+detail:''));
      return;
    }
    const data=await response.json();
    songInfo.lyrics=(data.text||'').trim();
    saveSongInfo();
    lyricsEl.value=songInfo.lyrics;
    toast('Lyrics transcribed');
  }catch(e){
    toast('Could not reach ElevenLabs from this page');
  }finally{
    button.disabled=false;button.textContent=original;
  }
}
function syncMasterLyricsToScenes(value){
  const lines=String(value||'').split(/\n+/).map(l=>l.trim()).filter(Boolean);
  if(!lines.length){toast('No lyrics to add');return;}
  const pool=selectedSceneIds.size?selectedScenes():scenes;
  const timed=pool
    .map(scene=>({scene,tc:parseTimecode(scene.time)}))
    .filter(item=>item.tc&&item.tc.end!==null)
    .sort((a,b)=>a.tc.start-b.tc.start);
  if(!timed.length){toast('Add timecodes to scenes first');return;}
  timed.forEach((item,idx)=>{
    const start=Math.floor(idx*lines.length/timed.length);
    const end=Math.floor((idx+1)*lines.length/timed.length);
    item.scene.lyrics=lines.slice(start,Math.max(start+1,end)).join('\n');
  });
  save();render();toast('Lyrics added to '+(selectedSceneIds.size?'selected':'timed')+' scenes');
}

function normChat(value){
  return String(value||'').toLowerCase().replace(/[’']/g,'').replace(/[^a-z0-9]+/g,' ').replace(/\s+/g,' ').trim();
}
function titleCase(value){
  return String(value||'').trim().replace(/\w\S*/g,word=>word.charAt(0).toUpperCase()+word.slice(1).toLowerCase());
}
function cleanChatValue(value){
  return String(value||'').trim().replace(/^["'“”]+|["'“”]+$/g,'').trim();
}
function plural(n,word){return n+' '+word+(n===1?'':'s');}
function labelForField(field){
  if(!field)return '';
  const labels={act:'Act',num:'Scene #',title:'Title',time:'Timecode',location:'Location',status:'Status',camera:'Camera',lyrics:'Lyrics',shots:'Key shots',note:"Director's note"};
  return field.label||labels[field.key]||titleCase(field.key);
}
function resolveChatField(raw,createCustom=false){
  const cleaned=cleanChatValue(raw).replace(/\b(field|section)\b/gi,'').trim();
  const n=normChat(cleaned);
  const aliases=[
    {key:'act',label:'Act',terms:['act']},
    {key:'num',label:'Scene #',terms:['scene number','scene num','number','num']},
    {key:'title',label:'Title',terms:['title','scene title','name']},
    {key:'time',label:'Timecode',terms:['time','timecode','time code']},
    {key:'location',label:'Location',terms:['location','place']},
    {key:'status',label:'Status',terms:['status']},
    {key:'camera',label:'Camera',terms:['camera','cameras']},
    {key:'lyrics',label:'Lyrics',terms:['lyrics','song text','song']},
    {key:'shots',label:'Key shots',terms:['shots','shot','key shots','shot list']},
    {key:'note',label:"Director's note",terms:['note','director note','directors note','director s note','director']},
    {key:'extras',label:'Extras',terms:['extras']},
    {key:'wardrobe',label:'Wardrobe',terms:['wardrobe','clothing','costume','costumes']},
    {key:'props',label:'Props',terms:['props','prop']}
  ];
  const direct=aliases.find(a=>a.terms.some(term=>n===normChat(term)));
  if(direct)return direct;
  const existing=fieldSettings.find(f=>n===normChat(f.label)||n===normChat(f.key)||normChat(f.label).includes(n));
  if(existing)return {key:existing.key,label:existing.label,kind:existing.kind};
  if(!createCustom||!cleaned)return null;
  const key=slugField(cleaned);
  const field={key,label:titleCase(cleaned),builtIn:false,visible:true,defaultOpen:false,kind:'text'};
  fieldSettings.push(field);saveFieldSettings();
  scenes.forEach(scene=>{if(scene[key]===undefined)scene[key]='';});
  compose[key]=compose[key]||'';
  return field;
}
function splitChatList(value){
  return String(value||'').split(/\n|;|,(?=\s*\S)/).map(cleanChatValue).filter(Boolean);
}
function getSceneField(scene,field){
  if(field.key==='camera')return [...(scene.camera||[])];
  if(field.key==='shots')return [...(scene.shots||[])];
  return scene[field.key]||'';
}
function setSceneField(scene,field,value,mode='set'){
  const v=cleanChatValue(value);
  if(field.key==='act'){addOption('act',v);scene.act=v;return;}
  if(field.key==='location'){addOption('location',v);scene.location=v;return;}
  if(field.key==='status'){addOption('status',v);scene.status=v;return;}
  if(field.key==='camera'){
    const vals=Array.isArray(value)?value:splitChatList(v);
    vals.forEach(cam=>addOption('camera',cam));
    scene.camera=mode==='append'?uniqueList([...(scene.camera||[]),...vals]):vals;
    return;
  }
  if(field.key==='shots'){
    const vals=Array.isArray(value)?value:splitChatList(v);
    scene.shots=mode==='append'?[...(scene.shots||[]),...vals]:vals;
    return;
  }
  if(mode==='append'&&scene[field.key]){
    scene[field.key]=scene[field.key]+'\n'+v;
  }else{
    scene[field.key]=v;
  }
}
function findSceneByToken(token){
  const n=normChat(String(token||'').replace(/^scene\s+/i,''));
  return scenes.find(s=>normChat(s.num)===n)||scenes.find(s=>normChat(s.title)===n)||scenes.find(s=>normChat(s.title).includes(n)||normChat(s.num).includes(n));

function scenesForScope(raw){
  let scope=cleanChatValue(raw||'all');
  let n=normChat(scope.replace(/\b(the|cards?|scenes?)\b/gi,''));
  if(!n||n==='all'||n==='everything'||n==='board')return [...scenes];
  if(n==='selected'||n==='selection'||n==='intended'||n==='checked')return selectedScenes();
  if(n==='visible'||n==='filtered')return visibleScenes();
  const sceneMatch=n.match(/^scene\s+(.+)$/);
  if(sceneMatch){const scene=findSceneByToken(sceneMatch[1]);return scene?[scene]:[];}
  const findOption=(list)=>list.find(item=>normChat(item)===n||normChat(item).includes(n)||n.includes(normChat(item)));
  let act=findOption(acts);
  if(!act){
    const actNumber=n.match(/act\s+([0-9]+)/);
    if(actNumber)act=acts.find(item=>normChat(item).startsWith('act '+actNumber[1]));
  }
  if(act)return scenes.filter(scene=>scene.act===act);
  const loc=findOption(locations);if(loc)return scenes.filter(scene=>scene.location===loc);
  const status=findOption(statuses);if(status)return scenes.filter(scene=>scene.status===status);
  const cam=findOption(cameras);if(cam)return scenes.filter(scene=>(scene.camera||[]).includes(cam));
  const scene=findSceneByToken(n);if(scene)return [scene];
  return scenes.filter(scene=>normChat([scene.num,scene.title,scene.act,scene.location,scene.status,...(scene.camera||[])].join(' ')).includes(n));
}
function createScene(act,overrides={}){
  const id=Math.max(...scenes.map(s=>s.id),0)+1;
  const actName=overrides.act||act||activeFilters.act||acts[0]||'New act';
  addOption('act',actName);
  const actScenes=scenes.filter(scene=>scene.act===actName);
  const lastActScene=actScenes[actScenes.length-1];
  const scene={id,act:actName,num:overrides.num||String(id),title:overrides.title||'Untitled scene',time:overrides.time||'',location:overrides.location||lastActScene?.location||locations[0]||'Other',status:overrides.status||statuses[0]||'Not shot',lyrics:overrides.lyrics||'',shots:overrides.shots||[],note:overrides.note||'',camera:overrides.camera||[],media:[]};
  fieldSettings.forEach(field=>{if(field.kind!=='shots'&&scene[field.key]===undefined)scene[field.key]=overrides[field.key]||'';});
  const lastIndex=[...scenes].map((s,i)=>s.act===actName?i:-1).filter(i=>i>=0).pop();
  if(lastIndex===undefined)scenes.push(scene);else scenes.splice(lastIndex+1,0,scene);
  save();render();
  setTimeout(()=>{const card=document.querySelector('.scene-card[data-id="'+scene.id+'"]');if(card)card.scrollIntoView({behavior:'smooth',block:'nearest'});},80);
  return scene;
}
function chatSetField(fieldRaw,scopeRaw,value,mode='set'){
  const field=resolveChatField(fieldRaw,true);
  const targets=scenesForScope(scopeRaw);
  if(!field)return 'I could not find that field.';
  if(!targets.length)return 'I could not find matching cards for that scope.';
  targets.forEach(scene=>setSceneField(scene,field,value,mode));
  syncOptionsFromScenes();save();render();
  const verb=mode==='append'?'Added to':'Set';
  return verb+' '+labelForField(field)+' on '+plural(targets.length,'card')+'.';
}
function chatCopyField(fieldRaw,sourceRaw,scopeRaw){
  const field=resolveChatField(fieldRaw,false);
  const source=findSceneByToken(sourceRaw);
  if(!field)return 'I could not find that field.';
  if(!source)return 'I could not find the source scene.';
  const targets=scenesForScope(scopeRaw).filter(scene=>scene.id!==source.id);
  if(!targets.length)return 'I could not find target cards for that scope.';
  const value=getSceneField(source,field);
  targets.forEach(scene=>setSceneField(scene,field,Array.isArray(value)?[...value]:value));
  syncOptionsFromScenes();save();render();
  return 'Copied '+labelForField(field)+' from Scene '+source.num+' to '+plural(targets.length,'card')+'.';
}
function chatSummary(){
  const byStatus=statuses.map(status=>status+': '+scenes.filter(scene=>scene.status===status).length).filter(line=>!line.endsWith(': 0'));
  const byAct=acts.map(act=>act+': '+scenes.filter(scene=>scene.act===act).length).filter(line=>!line.endsWith(': 0'));
  return plural(scenes.length,'card')+'. Statuses: '+(byStatus.join(', ')||'none')+'. Acts: '+(byAct.join(', ')||'none')+'.';
}
function runBoardChat(text){
  try{
    const t=String(text||'').trim();
    if(!t)return 'Nothing to change yet.';
    if(/\b(summary|summarize|overview|how many|count)\b/i.test(t))return chatSummary();
    let m=t.match(/^(?:copy|propagate)\s+(.+?)\s+from\s+scene\s+(.+?)\s+to\s+(.+)$/i);
    if(m)return chatCopyField(m[1],m[2],m[3]);
    m=t.match(/^rename\s+(act|location|status|camera)\s+(.+?)\s+to\s+(.+)$/i);
    if(m){renameOption(m[1].toLowerCase(),cleanChatValue(m[2]),cleanChatValue(m[3]));return 'Renamed '+m[1]+'.';}
    m=t.match(/^(?:set|change|update)\s+status\s+from\s+(.+?)\s+to\s+(.+?)(?:\s+(?:for|in|on)\s+(.+))?$/i);
    if(m){
      const from=cleanChatValue(m[1]),to=cleanChatValue(m[2]);
      const targets=scenesForScope(m[3]||'all').filter(scene=>normChat(scene.status)===normChat(from));
      if(!targets.length)return 'No cards currently have that status.';
      targets.forEach(scene=>setSceneField(scene,{key:'status',label:'Status'},to));
      syncOptionsFromScenes();save();render();
      return 'Changed '+plural(targets.length,'status')+' from '+from+' to '+to+'.';
    }
    if(/\badd\b.*\bscene\b/i.test(t)){
      const act=acts.find(item=>normChat(t).includes(normChat(item)))||acts.find(item=>{const n=normChat(item).match(/^act\s+([0-9]+)/);return n&&normChat(t).includes('act '+n[1]);})||activeFilters.act||acts[0];
      const titleMatch=t.match(/(?:called|named|titled)\s+(.+?)(?:\s+(?:at|in location|with status|status|time)\s+|$)/i);
      const scene=createScene(act,{title:titleMatch?cleanChatValue(titleMatch[1]):'Untitled scene'});
      return 'Added Scene '+scene.num+' to '+scene.act+'.';
    }
    m=t.match(/^(?:append|add)\s+(.+?)\s+(?:for|to|in|on)\s+(.+?)\s*:\s*(.+)$/i);
    if(m)return chatSetField(m[1],m[2],m[3],'append');
    m=t.match(/^clear\s+(.+?)\s+(?:for|in|on)\s+(.+)$/i);
    if(m)return chatSetField(m[1],m[2],'','set');
    m=t.match(/^(?:set|change|update)\s+(.+?)\s+(?:for|in|on)\s+(.+?)\s+to\s+(.+)$/i);
    if(m)return chatSetField(m[1],m[2],m[3]);
    m=t.match(/^(?:set|change|update)\s+(.+?)\s+to\s+(.+?)\s+(?:for|in|on)\s+(.+)$/i);
    if(m)return chatSetField(m[1],m[3],m[2]);
    m=t.match(/^(?:set|change|update)\s+(.+?)\s+(.+?)\s+to\s+(.+)$/i);
    if(m&&resolveChatField(m[2],false))return chatSetField(m[2],m[1],m[3]);
    return 'I could not confidently apply that. Try a direct change like “set status for Act 3 to Scheduled” or “copy props from scene 7 to Act 3”.';
  }catch(e){
    return 'I hit an error while applying that change.';
  }
}
function boardAgentInstructions(){
  return [
    'You are ChatGPT inside a storyboard card app.',
    'Respond like a helpful creative production partner. You can brainstorm freely and you can make board changes through actions.',
    'Return only valid JSON with this shape: {"message":"short human response","actions":[...]}',
    'Use actions only when the user asks to change the board. For ideas, notes, planning, or questions, use an empty actions array.',
    'Allowed actions:',
    '{"type":"set_field","scope":"all|visible|selected|Act name|Location name|Status name|Camera name|scene number/title","field":"field label","value":"text or list","mode":"set|append"}',
    '{"type":"copy_field","field":"field label","from":"scene number/title","to":"all|visible|selected|Act name|Location name|Status name|Camera name"}',
    '{"type":"add_scene","act":"Act name","title":"Title","fields":{"location":"...","status":"...","shots":["..."],"props":"..."}}',
    '{"type":"rename_option","optionType":"act|location|status|camera","from":"old","to":"new"}',
    '{"type":"add_option","optionType":"act|location|status|camera","value":"new"}',
    'Fields include act, num, title, time, location, status, camera, lyrics, shots, note, extras, wardrobe, props, and custom field labels.',
    'Prefer exact existing act/location/status/camera names from the board context.',
    'If the user refers to the cards they selected, checked, picked, or intended, use scope "selected".'
  ].join('\n');
}
function sceneForAgent(scene){
  const out={id:scene.id,num:scene.num,title:scene.title,act:scene.act,time:scene.time,location:scene.location,status:scene.status,camera:scene.camera||[]};
  fieldSettings.forEach(field=>{out[field.label||field.key]=field.kind==='shots'?(scene.shots||[]):(scene[field.key]||'');});
  return out;
}
function boardAgentContext(userText){
  return {
    user:userText,
    fields:fieldSettings.map(field=>({key:field.key,label:field.label,kind:field.kind,visible:field.visible!==false})),
    acts,locations,statuses,cameras,
    activeFilters,
    selectedSceneIds:[...selectedSceneIds],
    selectedScenes:selectedScenes().map(sceneForAgent),
    scenes:scenes.map(sceneForAgent)
  };
}
function extractResponseText(data){
  if(data.output_text)return data.output_text;
  if(Array.isArray(data.output)){
    return data.output.flatMap(item=>item.content||[]).map(part=>part.text||part.output_text||'').join('').trim();
  }
  return '';
}
function parseAgentPayload(text){
  const raw=String(text||'').trim();
  if(!raw)return {message:'No response came back.',actions:[]};
  try{return JSON.parse(raw);}
  catch(e){
    const match=raw.match(/\{[\s\S]*\}/);
    if(match){try{return JSON.parse(match[0]);}catch(err){}}
  }
  return {message:raw,actions:[]};
}
function applyAgentActions(actions){
  if(!Array.isArray(actions)||!actions.length)return [];
  const results=[];
  actions.forEach(action=>{
    if(!action||!action.type)return;
    const type=normChat(action.type).replace(/\s+/g,'_');
    if(type==='set_field'){
      results.push(chatSetField(action.field,action.scope||action.target||'all',action.value,action.mode==='append'?'append':'set'));
    }else if(type==='copy_field'){
      results.push(chatCopyField(action.field,action.from||action.source,action.to||action.scope||action.target||'all'));
    }else if(type==='add_scene'){
      const scene=createScene(action.act||activeFilters.act||acts[0],{title:action.title||'Untitled scene'});
      Object.entries(action.fields||{}).forEach(([fieldRaw,value])=>{
        const field=resolveChatField(fieldRaw,true);
        if(field)setSceneField(scene,field,value);
      });
      syncOptionsFromScenes();save();render();
      results.push('Added Scene '+scene.num+' to '+scene.act+'.');
    }else if(type==='rename_option'){
      const optionType=String(action.optionType||action.option||'').toLowerCase();
      if(validOptionType(optionType)&&action.from&&action.to){renameOption(optionType,action.from,action.to);results.push('Renamed '+optionType+'.');}
    }else if(type==='add_option'){
      const optionType=String(action.optionType||action.option||'').toLowerCase();
      if(validOptionType(optionType)&&addOption(optionType,action.value)){syncOptionsFromScenes();render();results.push('Added '+optionLabel(optionType)+'.');}
    }else if(type==='delete_scene'){
      const scene=findSceneByToken(action.scene||action.target||'');
      if(scene){scenes=scenes.filter(s=>s.id!==scene.id);save();render();results.push('Deleted Scene '+scene.num+'.');}
    }
  });
  return results.filter(Boolean);
}
async function runOpenAIAgent(text,key){
  try{
    const response=await fetch('https://api.openai.com/v1/responses',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},
      body:JSON.stringify({
        model:getOpenAIModel(),
        instructions:boardAgentInstructions(),
        input:JSON.stringify(boardAgentContext(text)),
        max_output_tokens:1400,
        text:{format:{type:'json_object'}}
      })
    });
    if(!response.ok){
      let detail='';
      try{const err=await response.json();detail=err.error?.message||'';}catch(e){}
      return 'OpenAI returned '+response.status+(detail?': '+detail:'')+'. Local board commands still work without the key.';
    }
    const data=await response.json();
    const payload=parseAgentPayload(extractResponseText(data));
    const results=applyAgentActions(payload.actions||[]);
    const msg=payload.message||'Done.';
    return results.length?msg+'\n\nApplied: '+results.join(' '):msg;
  }catch(e){
    return 'I could not reach OpenAI from this local page. If the browser blocks the request, this needs a tiny local proxy/server. Local board commands still work.';
  }
}
async function runClaudeAgent(text,key){

      body:JSON.stringify({

  }catch(e){

}

function makeSetupDragHandle(label,type,idx){
  const handle=document.createElement('button');
  handle.type='button';
  handle.className='setup-drag-handle';
  handle.draggable=true;
  handle.title='Drag to reorder';
  handle.setAttribute('aria-label','Drag '+label+' to reorder');
  handle.innerHTML='<span></span><span></span><span></span><span></span><span></span><span></span>';
  handle.addEventListener('dragstart',e=>{
    setupDrag={type,from:idx};
    e.dataTransfer.effectAllowed='move';
    e.dataTransfer.setData('text/plain',type+':'+idx);
    const row=handle.closest('.field-row-ctl,.option-row');
    if(row)row.classList.add('is-dragging');
  });
  handle.addEventListener('dragend',()=>{setupDrag=null;clearSetupDragRows();});
  return handle;
}
function enableSetupDrop(row,type,to,onDrop){
  row.addEventListener('dragover',e=>{
    if(!setupDrag||setupDrag.type!==type)return;
    e.preventDefault();
    e.dataTransfer.dropEffect='move';
    row.classList.add('setup-row-drag-over');
  });
  row.addEventListener('dragleave',e=>{
    if(!row.contains(e.relatedTarget))row.classList.remove('setup-row-drag-over');
  });
  row.addEventListener('drop',e=>{
    if(!setupDrag||setupDrag.type!==type)return;
    e.preventDefault();
    const from=setupDrag.from;
    setupDrag=null;
    clearSetupDragRows();
    onDrop(from,to);
  });
}
function reorderList(list,from,to){
  from=Number(from);to=Number(to);
  if(!Number.isInteger(from)||!Number.isInteger(to)||from===to||from<0||to<0||from>=list.length||to>=list.length)return false;
  const [item]=list.splice(from,1);
  list.splice(to,0,item);
  return true;
}

function optionList(type){if(type==='act')return acts;if(type==='camera')return cameras;return type==='location'?locations:statuses;}
function validOptionType(type){return ['act','location','status','camera'].includes(type);}
function optionKey(type){if(type==='act')return 'act';if(type==='camera')return 'camera';return type==='location'?'location':'status';}
function optionLabel(type){if(type==='act')return 'Act';if(type==='camera')return 'Camera';return type==='location'?'Location':'Status';}
function addOption(type,name){
  const value=String(name||'').trim();
  if(!value)return '';
  const list=optionList(type);
  const existing=list.find(v=>v.toLowerCase()===value.toLowerCase());
  if(existing)return existing;
  list.push(value);saveOptionLists();return value;
}
