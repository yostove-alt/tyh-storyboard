  return added;
}
function renameOption(type,oldValue,newValue){
  const clean=String(newValue||'').trim();
  if(!clean||clean===oldValue){renderPanel();return;}
  const list=optionList(type);
  const key=optionKey(type);
  const existing=list.find(v=>v!==oldValue&&v.toLowerCase()===clean.toLowerCase());
  const finalValue=existing||clean;
  if(existing){
    const idx=list.indexOf(oldValue);if(idx>=0)list.splice(idx,1);
  } else {
    const idx=list.indexOf(oldValue);if(idx>=0)list[idx]=finalValue;
  }
  scenes.forEach(scene=>{if(scene[key]===oldValue)scene[key]=finalValue;});
  if(type==='camera'){
    scenes.forEach(scene=>{scene.camera=(scene.camera||[]).map(c=>c===oldValue?finalValue:c);});
    compose.camera=(compose.camera||[]).map(c=>c===oldValue?finalValue:c);
    if(activeFilters.cam===oldValue)activeFilters.cam=finalValue;
  } else if(compose[key]===oldValue)compose[key]=finalValue;
  if(type==='act'&&activeFilters.act===oldValue)activeFilters.act=finalValue;
  if(type==='location'&&activeFilters.loc===oldValue)activeFilters.loc=finalValue;
  if(type==='status'&&activeFilters.status===oldValue)activeFilters.status=finalValue;
  saveOptionLists();save();renderPanel();render();toast('Renamed');
}
function removeOption(type,value){
  const list=optionList(type);
  if(list.length<=1)return;
  const key=optionKey(type);
  const fallback=list.find(v=>v!==value)||'';
  const msg=type==='camera'?'Remove "'+value+'"? It will be cleared from scenes using it.':'Remove "'+value+'"? Scenes using it will move to "'+fallback+'".';
  if(!confirm(msg))return;
  const idx=list.indexOf(value);if(idx>=0)list.splice(idx,1);
  if(type==='camera'){
    scenes.forEach(scene=>{scene.camera=(scene.camera||[]).filter(c=>c!==value);});
    compose.camera=(compose.camera||[]).filter(c=>c!==value);
  } else {
    scenes.forEach(scene=>{if(scene[key]===value)scene[key]=fallback;});
    if(compose[key]===value)compose[key]=fallback;
  }
  saveOptionLists();save();renderPanel();render();toast('Removed');
}

function getGroupColor(val,field){

function getGroups(field){

}

function clipTimes(scene,item,index,count){
  const tc=parseTimecode(scene.time);
  if(!tc||tc.end===null)return {start:0,end:1};
  if(Number.isFinite(item.tlStart)&&Number.isFinite(item.tlEnd))return {start:item.tlStart,end:item.tlEnd};
  const each=Math.max(0,(tc.end-tc.start)/Math.max(1,count));
  return {start:tc.start+index*each,end:Math.min(tc.end,tc.start+(index+1)*each)};
}
function startClipEdit(e,clip,item,scene,mode){
  e.preventDefault();e.stopPropagation();
  const lane=clip.closest('.track-lane');
  const tc=parseTimecode(scene.time);if(!tc||tc.end===null)return;
  const startX=e.clientX;
  const chosen=(scene.media||[]).filter(media=>media.timeline!==false);
  const itemIndex=Math.max(0,chosen.indexOf(item));
  const original=clipTimes(scene,item,0,1);
  const prev=itemIndex>0?clipTimes(scene,chosen[itemIndex-1],itemIndex-1,chosen.length):null;
  const next=itemIndex<chosen.length-1?clipTimes(scene,chosen[itemIndex+1],itemIndex+1,chosen.length):null;
  const minStart=prev?prev.end:tc.start;
  const maxEnd=next?next.start:tc.end;
  const width=original.end-original.start;
  item.tlStart=Number(original.start.toFixed(2));item.tlEnd=Number(original.end.toFixed(2));
  const move=ev=>{
    const delta=(ev.clientX-startX)/animaticZoom;
    let ns=original.start,ne=original.end;
    if(mode==='move'){ns=original.start+delta;ne=ns+width;}
    if(mode==='left'){ns=original.start+delta;ne=original.end;}
    if(mode==='right'){ns=original.start;ne=original.end+delta;}
    const minClip=Math.min(.25,Math.max(.01,maxEnd-minStart));
    ns=Math.max(minStart,Math.min(ns,maxEnd-minClip));
    ne=Math.max(ns+minClip,Math.min(ne,maxEnd));
    if(mode==='move'&&ne>maxEnd){ne=maxEnd;ns=ne-width;}
    if(mode==='move'&&ns<minStart){ns=minStart;ne=ns+width;}
    item.tlStart=Number(ns.toFixed(2));item.tlEnd=Number(ne.toFixed(2));
    clip.style.left=(item.tlStart*animaticZoom)+'px';
    clip.style.width=((item.tlEnd-item.tlStart)*animaticZoom)+'px';
  };
  const up=()=>{window.removeEventListener('mousemove',move);window.removeEventListener('mouseup',up);save();updateAnimaticPreview();};
  window.addEventListener('mousemove',move);window.addEventListener('mouseup',up);
}
function timedScenes(){
  return scenes.filter(scene=>{const tc=parseTimecode(scene.time);return tc&&tc.end!==null;});

function animaticDuration(){

function updateSceneTiming(sceneId,startRaw,endRaw){
  const scene=scenes.find(s=>s.id===sceneId);if(!scene)return;
  const start=parseLooseTime(startRaw);
  const end=parseLooseTime(endRaw);
  if(start===null){toast('Use m:ss for start time');render();return;}
  scene.time=fmtTime(start)+(end!==null?' – '+fmtTime(end):'');
  resetSceneMediaTiming(scene);
  save();updateAnimaticPreview();toast('Timing updated');
}
function resetSceneMediaTiming(scene){

function parseLooseTime(value){
  const text=String(value||'').trim();
  if(!text)return null;
  if(/^\d+$/.test(text))return parseInt(text,10);
  const m=text.match(/^(\d+):(\d{1,2})$/);
  if(!m)return null;
  return parseInt(m[1],10)*60+parseInt(m[2],10);
}

    else toast('Upload the audio track using the player at the top');
  };
  const tb=document.createElement('div');tb.className='time-badge';tb.title='Click to play/pause this timecode';
  tb.textContent=scene.time||'—';
  tb.onclick=e=>{
    if(e.shiftKey){iEditTime(scene.id,tb);return;}
    const tc=parseTimecode(scene.time);
    if(tc!==null&&globalAudio){
      const end=tc.end??globalAudio.duration;
      toggleSectionPlayback(scene.id,tc.start,end);
    } else if(tc===null){iEditTime(scene.id,tb);}
    else{toast('Upload the audio track using the player at the top');}
  };
  const clock=document.createElement('span');clock.className='section-clock';clock.dataset.sceneId=String(scene.id);clock.textContent='0:00';
  timeControls.appendChild(stopBtn);timeControls.appendChild(tb);timeControls.appendChild(clock);
  top.appendChild(meta);top.appendChild(timeControls);body.appendChild(top);

  // Pills row: Act + Location + Camera
  const pr=document.createElement('div');pr.className='pills-row';
  const locColor=colorForOption(scene.location,'location');
  const locPill=document.createElement('div');locPill.className='pill';locPill.style.cssText=`border-color:${locColor}55;color:${locColor};background:${locColor}12;`;
  locPill.innerHTML=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:9px;height:9px"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>${scene.location}`;
  locPill.onclick=()=>iEditLoc(scene.id,locPill);pr.appendChild(locPill);

  const stColor=colorForOption(scene.status,'status');
  const stPill=document.createElement('select');stPill.className='pill-sel-inline';
  stPill.style.cssText=`border-color:${stColor}55;color:${stColor};background:${stColor}12;`;
  [...statuses,'＋ Add status…'].forEach(v=>{const o=document.createElement('option');o.value=v;o.textContent=v;if(scene.status===v)o.selected=true;stPill.appendChild(o);});
  stPill.onchange=()=>{const s=scenes.find(s=>s.id===scene.id);if(stPill.value==='＋ Add status…'){const added=promptAddOption('status');if(added&&s)s.status=added;}else if(s){s.status=stPill.value;}save();render();};pr.appendChild(stPill);
  body.appendChild(pr);

  const camCtl=makeCameraDropdown(scene.camera||[],vals=>{
    const s=scenes.find(s=>s.id===scene.id);if(!s)return;
    s.camera=vals;save();
    if(groupBy==='camera')render();else applyFilters();
  },true);
  camCtl.style.marginBottom='8px';
  body.appendChild(camCtl);

  // ── COLLAPSIBLE SECTIONS ──
  const mkSection=(label,renderFn,startOpen=true)=>{
    const sec=document.createElement('div');sec.className='section';
    const hdr=document.createElement('div');hdr.className='section-hdr';
    const lbl=document.createElement('span');lbl.className='slabel';lbl.textContent=label;
    const chev=document.createElement('span');chev.className='chevron'+(startOpen?' open':'');chev.textContent='▶';
    hdr.appendChild(lbl);hdr.appendChild(chev);
    const secBody=document.createElement('div');secBody.className='section-body'+(startOpen?'':' collapsed');
    hdr.onclick=()=>{secBody.classList.toggle('collapsed');chev.classList.toggle('open');};
    renderFn(secBody);sec.appendChild(hdr);sec.appendChild(secBody);return sec;
  };

  fieldSettings.filter(field=>field.visible!==false).forEach(field=>{
    body.appendChild(mkSection(field.label, sb=>{
      if(field.kind==='lyrics'){
        const lyrEl=document.createElement('div');lyrEl.className='lyrics-block';
        renderLyricLines(lyrEl,scene);
        lyrEl.onclick=()=>iEditTA(scene.id,'lyrics',lyrEl,'lyrics-ta');sb.appendChild(lyrEl);
      } else if(field.kind==='shots'){
        const sl=document.createElement('div');sl.className='shot-list';
        (scene.shots||[]).forEach((sh,i)=>{
          const row=document.createElement('div');row.className='shot-row';
          const dot=document.createElement('div');dot.className='shot-dot';
          const txt=document.createElement('div');txt.className='shot-txt';txt.textContent=sh;txt.onclick=()=>iEditShot(scene.id,i,txt);
          const x=document.createElement('button');x.className='shot-x';x.innerHTML='✕';x.onclick=()=>{const s=scenes.find(s=>s.id===scene.id);s.shots.splice(i,1);save();render();};
          row.appendChild(dot);row.appendChild(txt);row.appendChild(x);sl.appendChild(row);
        });
        const asb=document.createElement('button');asb.className='add-shot-c';asb.textContent='+ add shot';asb.onclick=()=>{const s=scenes.find(s=>s.id===scene.id);s.shots.push('New shot');save();render();};
        sb.appendChild(sl);sb.appendChild(asb);
      } else {
        const el=document.createElement('div');
        el.className=field.kind==='note'?'note-block':'props-block';
        el.textContent=scene[field.key]||('Click to add '+field.label.toLowerCase()+'…');
        el.onclick=()=>iEditTA(scene.id,field.key,el,field.kind==='note'?'note-ta':'props-ta');
        sb.appendChild(el);
      }
    }, !!field.defaultOpen));
  });

  card.appendChild(body);

  // FOOTER
  const footer=document.createElement('div');footer.className='card-footer';
  const delBtn=document.createElement('button');delBtn.className='card-del-btn';delBtn.textContent='Delete';delBtn.onclick=()=>{if(confirm('Delete "'+scene.title+'"?')){scenes=scenes.filter(s=>s.id!==scene.id);save();render();}};
  footer.appendChild(delBtn);card.appendChild(footer);
  return card;
}

function lyricLines(scene){
  return String(scene?.lyrics||'').split(/\n+/).map(line=>line.trim()).filter(Boolean);
}
function renderLyricLines(container,scene){
  const lines=lyricLines(scene);
  if(!lines.length){
    container.textContent='Click to add lyrics…';
    return;
  }
  container.textContent=lines.join('\n');
}

// INLINE EDITS
function iEdit(id,key,el,cls){const s=scenes.find(s=>s.id===id);const inp=document.createElement('input');inp.type='text';inp.className=cls;inp.value=s[key];el.replaceWith(inp);inp.focus();inp.select();const done=()=>{s[key]=inp.value||s[key];save();render();};inp.onblur=done;inp.onkeydown=e=>{if(e.key==='Enter')done();if(e.key==='Escape')render();};}
function iEditTime(id,el){const s=scenes.find(s=>s.id===id);const inp=document.createElement('input');inp.className='time-inp';inp.value=s.time;el.replaceWith(inp);inp.focus();inp.select();const done=()=>{s.time=inp.value;save();render();};inp.onblur=done;inp.onkeydown=e=>{if(e.key==='Enter')done();if(e.key==='Escape')render();};}
function iEditTA(id,key,el,cls){const s=scenes.find(s=>s.id===id);const ta=document.createElement('textarea');ta.className=cls;ta.value=s[key]||'';el.replaceWith(ta);ta.focus();const done=()=>{s[key]=ta.value;save();render();};ta.onblur=done;ta.onkeydown=e=>{if(e.key==='Escape')done();};}
function iEditShot(id,idx,el){const s=scenes.find(s=>s.id===id);const inp=document.createElement('input');inp.className='shot-inp';inp.value=s.shots[idx];el.replaceWith(inp);inp.focus();inp.select();const done=()=>{s.shots[idx]=inp.value||s.shots[idx];save();render();};inp.onblur=done;inp.onkeydown=e=>{if(e.key==='Enter')done();if(e.key==='Escape')render();};}
function iEditLoc(id,el){
  const s=scenes.find(s=>s.id===id);const sel=document.createElement('select');sel.className='pill-sel-inline';
  [...locations,'＋ Add location…'].forEach(l=>{const o=document.createElement('option');o.value=l;o.textContent=l;if(s.location===l)o.selected=true;sel.appendChild(o);});
  el.replaceWith(sel);sel.focus();
  let doneOnce=false;
  const done=()=>{if(doneOnce)return;doneOnce=true;if(sel.value==='＋ Add location…'){const added=promptAddOption('location');if(added)s.location=added;}else{s.location=sel.value;}save();render();};
  sel.onblur=done;sel.onchange=done;
}
function editActName(actName,el){const inp=document.createElement('input');inp.className='act-name-inp';inp.value=actName;el.replaceWith(inp);inp.focus();inp.select();const done=()=>{const n=inp.value.trim()||actName;scenes.forEach(s=>{if(s.act===actName)s.act=n;});save();render();};inp.onblur=done;inp.onkeydown=e=>{if(e.key==='Enter')done();if(e.key==='Escape')render();};}
function loadIntoPanel(id){
  const s=scenes.find(s=>s.id===id);
  compose=blankCompose();
  Object.assign(compose,{act:s.act,num:s.num,title:s.title,time:s.time,location:s.location,status:s.status,lyrics:s.lyrics||'',shots:[...(s.shots||[''])],note:s.note||'',camera:[...(s.camera||[])]});
  fieldSettings.forEach(field=>{if(field.kind!=='shots')compose[field.key]=s[field.key]||'';});
  openPanel('compose');toast('Loaded into panel');
}
function addSceneToAct(act){const scene=createScene(act);toast('Scene added');setTimeout(()=>{const title=document.querySelector('.scene-card[data-id="'+scene.id+'"] .scene-title');if(title)iEdit(scene.id,'title',title,'scene-title-inp');},120);}
function addSceneGlobal(){addSceneToAct(activeFilters.act||acts[0]||'New act');}
function addAct(){const name=prompt('New act name:');const added=addOption('act',name);if(!added)return;render();toast('Act added');}

// LIGHTBOX
function openLB(media,idx,title){lbMedia=media;lbIdx=idx;document.getElementById('lightbox').classList.add('open');document.getElementById('lbCap').textContent=title;renderLB();document.addEventListener('keydown',lbKey);}
function closeLB(){document.getElementById('lightbox').classList.remove('open');document.removeEventListener('keydown',lbKey);const w=document.getElementById('lbWrap');w.querySelectorAll('video').forEach(v=>v.pause());w.innerHTML='';}
function renderLB(){const w=document.getElementById('lbWrap');w.querySelectorAll('video').forEach(v=>v.pause());w.innerHTML='';const m=lbMedia[lbIdx];if(!m)return;if(m.type==='video'){const v=document.createElement('video');v.src=m.url;v.controls=true;v.autoplay=true;v.className='lb-media';w.appendChild(v);}else{const img=document.createElement('img');img.src=m.url;img.className='lb-media';w.appendChild(img);}document.getElementById('lbCnt').textContent=lbMedia.length>1?`${lbIdx+1} / ${lbMedia.length}`:'';document.getElementById('lbPrev').style.display=lbIdx>0?'flex':'none';document.getElementById('lbNext').style.display=lbIdx<lbMedia.length-1?'flex':'none';}
function lbNav(d){lbIdx=Math.max(0,Math.min(lbMedia.length-1,lbIdx+d));renderLB();}
function lbKey(e){if(e.key==='Escape')closeLB();if(e.key==='ArrowLeft')lbNav(-1);if(e.key==='ArrowRight')lbNav(1);}
document.getElementById('lightbox').onclick=e=>{if(e.target===e.currentTarget)closeLB();};

// ── AUDIO ──
let globalAudio=null;
function initAudio(url,name){
  if(globalAudio){globalAudio.pause();globalAudio=null;}
  globalAudio=new Audio(url);
  globalAudio.addEventListener('timeupdate',()=>{
    const scrub=document.getElementById('audioScrub');
    const timeEl=document.getElementById('audioTime');
    if(globalAudio.duration){scrub.value=(globalAudio.currentTime/globalAudio.duration)*100;}
    timeEl.textContent=fmtTime(globalAudio.currentTime);
    updatePlaybackControls();updateAnimaticPreview();
    if(sectionEnd!==null&&globalAudio.currentTime>=sectionEnd){
      globalAudio.pause();sectionEnd=null;currentPlaybackSceneId=null;currentPlaybackStart=null;
      updatePlaybackControls();updateAnimaticPreview();
      document.getElementById('audioPlayBtn').textContent='▶';
    }
  });
  globalAudio.addEventListener('ended',()=>{
    if(animaticLoop){globalAudio.currentTime=0;globalAudio.play();updateAnimaticPreview();return;}
    currentPlaybackSceneId=null;currentPlaybackStart=null;updatePlaybackControls();updateAnimaticPreview();document.getElementById('audioPlayBtn').textContent='▶';
  });
  document.getElementById('hdrAudio').style.display='flex';
  document.getElementById('audioTitle').textContent=name;
}
async function loadAudioTrack(input){
  const file=input.files[0];if(!file)return;
  const url=URL.createObjectURL(file);
  localStorage.removeItem('jdb_audio_url');
  localStorage.setItem('jdb_audio_name',file.name.replace(/\.[^.]+$/,''));
  songInfo.fileName=file.name;saveSongInfo();window.jdbSongFile=file;
  initAudio(url,file.name.replace(/\.[^.]+$/,''));
  toast('Audio loaded for this session');
  input.value='';
}
let sectionEnd=null;
function toggleSectionPlayback(sceneId,start,end){
  if(!globalAudio)return;
  if(!globalAudio.paused&&currentPlaybackSceneId===sceneId&&currentPlaybackStart===start&&sectionEnd===end){
    globalAudio.pause();
    updatePlaybackControls();
    document.getElementById('audioPlayBtn').textContent='▶';
    toast('Paused');
    return;
  }
  const sameSegment=currentPlaybackSceneId===sceneId&&currentPlaybackStart===start&&sectionEnd===end&&globalAudio.paused;
  if(sameSegment){
    globalAudio.play();
    document.getElementById('audioPlayBtn').textContent='⏸';
    updatePlaybackControls();
    toast('Resumed');
    return;
  }
  playSection(start,end,sceneId,true);
  toast('Playing: '+fmtTime(start)+(end?(' – '+fmtTime(end)):''));
}
function playSection(start,end,sceneId,restart=true){
  if(!globalAudio)return;
  sectionEnd=end;
  currentPlaybackSceneId=sceneId;
  currentPlaybackStart=start;
  if(restart)globalAudio.currentTime=start;
  globalAudio.play();
  document.getElementById('audioPlayBtn').textContent='⏸';
  updatePlaybackControls();
}
function stopSectionPlayback(sceneId,start){
  if(!globalAudio)return;
  globalAudio.pause();
  globalAudio.currentTime=start;
  sectionEnd=null;currentPlaybackSceneId=null;currentPlaybackStart=null;
  document.getElementById('audioPlayBtn').textContent='▶';
  updatePlaybackControls();
  toast('Stopped');
}
function toggleAudioPlay(){
  if(!globalAudio)return;
  const btn=document.getElementById('audioPlayBtn');
  if(globalAudio.paused){globalAudio.play();btn.textContent='⏸';}
  else{globalAudio.pause();btn.textContent='▶';}
  updatePlaybackControls();
}
function stopAnimatic(){
  if(!globalAudio)return;
  globalAudio.pause();globalAudio.currentTime=0;sectionEnd=null;currentPlaybackSceneId=null;currentPlaybackStart=null;
  document.getElementById('audioPlayBtn').textContent='▶';updatePlaybackControls();updateAnimaticPreview();
}
function replayAnimatic(){
  if(!globalAudio)return;
  globalAudio.currentTime=0;globalAudio.play();document.getElementById('audioPlayBtn').textContent='⏸';updatePlaybackControls();updateAnimaticPreview();
}
function scrubAudio(val){if(globalAudio&&globalAudio.duration){globalAudio.currentTime=(val/100)*globalAudio.duration;updatePlaybackControls();updateAnimaticPreview();}}
function clearAudio(){if(globalAudio){globalAudio.pause();globalAudio=null;}sectionEnd=null;currentPlaybackSceneId=null;currentPlaybackStart=null;updatePlaybackControls();localStorage.removeItem('jdb_audio_url');localStorage.removeItem('jdb_audio_name');document.getElementById('hdrAudio').style.display='none';}
function updatePlaybackControls(){
  document.querySelectorAll('.section-clock').forEach(clock=>{
    const id=Number(clock.dataset.sceneId);
    clock.textContent=(globalAudio&&currentPlaybackSceneId===id)?fmtTime(globalAudio.currentTime):'0:00';
  });
  document.querySelectorAll('.play-section-btn').forEach(btn=>{
    const id=Number(btn.dataset.sceneId);
    const active=!!globalAudio&&!globalAudio.paused&&currentPlaybackSceneId===id;
    btn.classList.toggle('active',active);
    btn.innerHTML=active
      ?'<svg viewBox="0 0 24 24" fill="currentColor"><rect x="7" y="5" width="3.8" height="14" rx="1"/><rect x="13.2" y="5" width="3.8" height="14" rx="1"/></svg>'
      :'<svg class="play-ico" viewBox="0 0 24 24" fill="currentColor"><polygon points="7,4 19,12 7,20"/></svg>';
  });
}
function fmtTime(s){const m=Math.floor(s/60);const sec=Math.floor(s%60);return m+':'+String(sec).padStart(2,'0');}
function parseTimecode(str){
  if(!str)return null;
  // Matches formats like "0:31 – 0:55" or "0:31-0:55" or "1:02" 
  const all=str.match(/(\d+):(\d+)/g);
  if(!all||!all.length)return null;
  const toSec=t=>{const p=t.split(':');return parseInt(p[0])*60+parseInt(p[1]);};
  const start=toSec(all[0]);
  const end=all.length>1?toSec(all[1]):null;
  return {start,end};
}
async function exportAnimaticVideo(){
  const clips=animaticClips();
  if(!clips.length){toast('Select card thumbnails for the timeline first');return;}
  const canvas=document.createElement('canvas');canvas.width=1280;canvas.height=720;
  const ctx=canvas.getContext('2d');
  const duration=animaticDuration();
  const fps=30;
  const mime=MediaRecorder.isTypeSupported('video/mp4;codecs=h264')?'video/mp4;codecs=h264':MediaRecorder.isTypeSupported('video/webm;codecs=vp9')?'video/webm;codecs=vp9':'video/webm';
  const stream=canvas.captureStream(fps);
  if(globalAudio&&globalAudio.captureStream){
    try{globalAudio.captureStream().getAudioTracks().forEach(track=>stream.addTrack(track));}catch(e){}
  }
  const chunks=[];
  const recorder=new MediaRecorder(stream,{mimeType:mime});
  recorder.ondataavailable=e=>{if(e.data.size)chunks.push(e.data);};
  recorder.onstop=()=>{
    const blob=new Blob(chunks,{type:mime});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='judoboards_animatic.'+(mime.includes('mp4')?'mp4':'webm');a.click();
    toast('Animatic exported');
  };
  const images=await preloadAnimaticImages(clips);
  let frame=0,total=Math.ceil(duration*fps);
  if(globalAudio){globalAudio.currentTime=0;globalAudio.play();}
  recorder.start();
  const tick=()=>{
    const t=frame/fps;
    drawAnimaticFrame(ctx,canvas,clips,images,t);
    frame++;
    if(frame<=total)requestAnimationFrame(tick);
    else{if(globalAudio)globalAudio.pause();recorder.stop();}
  };
  tick();
}
function animaticClips(){
  const clips=[];
  timedScenes().forEach(scene=>{
    const chosen=(scene.media||[]).filter(item=>item.timeline!==false);
    chosen.forEach((item,i)=>clips.push({scene,item,index:i,count:chosen.length,...clipTimes(scene,item,i,chosen.length)}));
  });
  return clips.sort((a,b)=>a.start-b.start);
}
function preloadAnimaticImages(clips){
  return Promise.all(clips.map(clip=>new Promise(resolve=>{
    if(clip.item.type==='video'){resolve(null);return;}
    const img=new Image();img.onload=()=>resolve(img);img.onerror=()=>resolve(null);img.src=clip.item.url;
  })));
}
function drawAnimaticFrame(ctx,canvas,clips,images,t){
  ctx.fillStyle='#101713';ctx.fillRect(0,0,canvas.width,canvas.height);
  const idx=clips.findIndex(clip=>t>=clip.start&&t<clip.end);
  const clip=clips[idx]||clips[clips.length-1];
  const img=images[idx];
  if(img){
    const scale=Math.min(canvas.width/img.width,canvas.height/img.height);
    const w=img.width*scale,h=img.height*scale,x=(canvas.width-w)/2,y=(canvas.height-h)/2;
    ctx.drawImage(img,x,y,w,h);
  }else{
    ctx.fillStyle='#DDECE3';ctx.font='36px serif';ctx.textAlign='center';ctx.fillText(clip?.scene?.title||'Animatic',canvas.width/2,canvas.height/2);
  }
  ctx.fillStyle='rgba(0,0,0,.55)';ctx.fillRect(24,canvas.height-78,canvas.width-48,54);
  ctx.fillStyle='#fff';ctx.font='22px sans-serif';ctx.textAlign='left';ctx.fillText((clip?.scene?.num||'')+' · '+(clip?.scene?.title||''),42,canvas.height-44);
  ctx.font='16px monospace';ctx.textAlign='right';ctx.fillText(fmtTime(t)+' / '+fmtTime(animaticDuration()),canvas.width-42,canvas.height-44);
}
// EXPORT
function exportJSON(){const blob=new Blob([JSON.stringify({scenes,fieldSettings,acts,locations,statuses,cameras,viewerRatio,cardHeight},null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='judoboards_barditchevers.json';a.click();toast('Exported!');}
function handleImport(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const data=JSON.parse(ev.target.result);if(Array.isArray(data)){scenes=data;}else{scenes=data.scenes||[];if(Array.isArray(data.fieldSettings)){localStorage.setItem('jdb_field_settings',JSON.stringify(data.fieldSettings));fieldSettings=loadFieldSettings();}if(Array.isArray(data.acts))acts=data.acts;if(Array.isArray(data.locations))locations=data.locations;if(Array.isArray(data.statuses))statuses=data.statuses;if(Array.isArray(data.cameras))cameras=data.cameras;if(data.viewerRatio)saveViewerRatio(data.viewerRatio);if(data.cardHeight)saveCardHeight(data.cardHeight);}syncOptionsFromScenes();save();render();toast('Imported!');}catch{toast('Invalid file');}};r.readAsText(f);e.target.value='';}

render();
setPanel(panelOpen);
localStorage.removeItem('jdb_audio_url');
</script>

<script>
function saveToCloud() {
  const btn = document.getElementById('saveCloudBtn');
  save();
  btn.textContent = 'Saved';
  toast('Saved locally');
  setTimeout(() => { btn.textContent = 'Save local'; }, 1200);
}

function openLocalMediaPicker(sceneId,media,ci,rSw,setCi){
  const input=document.createElement('input');
  input.type='file';
  input.accept='image/*,video/*,.heic,.mov,.mp4,.webm';
  input.multiple=true;
  input.onchange=()=>readLocalMediaFiles(Array.from(input.files||[]),results=>{
    results=results.filter(Boolean);
    if(!results.length)return;
    results.forEach(r=>media.push(r));
    setCi(media.length-1);
    const s=scenes.find(s=>s.id===sceneId);
    if(s)s.media=media.slice();
    save();rSw();toast(results.length+' file(s) added');
  });
  input.click();
}

async function readLocalMediaFiles(files,callback){
  const valid=files.filter(f=>f.type.startsWith('image')||f.type.startsWith('video'));
  if(!valid.length){toast('No valid files');return;}
  const results=await Promise.all(valid.map(file=>new Promise(resolve=>{
    const rt=file.type.startsWith('video')?'video':'image';
    if(file.size>1800000||rt==='video'){
      resolve({url:URL.createObjectURL(file),type:rt,name:file.name,transient:true});
      return;
    }
    const reader=new FileReader();
    reader.onload=()=>resolve({url:reader.result,type:rt,name:file.name});
    reader.onerror=()=>resolve(null);
    reader.readAsDataURL(file);
  })));
  callback(results.filter(Boolean));
}
