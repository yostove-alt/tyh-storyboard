<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Little Barditchevers — Storyboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F5F2EC;--surface:#FDFBF7;--border:#D8D2C4;--border-strong:#B8B0A0;
  --text:#1A1714;--text-muted:#7A7268;--text-faint:#B0A898;
  --accent:#2A5C3F;--accent-light:#E8F2EC;
  --gold:#C4952A;--gold-light:#FAF3E0;
  --danger:#C44A2A;--danger-light:#FDF0EC;
  --panel-w:400px;--radius:12px;--radius-sm:6px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Instrument Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}

/* HEADER */
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;gap:12px;}
.header-left h1{font-family:'DM Serif Display',serif;font-size:20px;letter-spacing:-.3px;}
.header-left p{font-size:11px;color:var(--text-muted);margin-top:1px;font-family:'DM Mono',monospace;}
.header-actions{display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
.btn{font-family:'Instrument Sans',sans-serif;font-size:12px;font-weight:500;padding:6px 13px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface);color:var(--text);cursor:pointer;transition:all .15s;white-space:nowrap;}
.btn:hover{background:var(--bg);border-color:var(--border-strong);}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent);}
.btn-primary:hover{background:#1e4530;}
.btn-gold{background:var(--gold);color:#fff;border-color:var(--gold);}
.btn-gold:hover{background:#a67d20;}
.btn-ghost{border-color:transparent;background:transparent;}
.btn-ghost:hover{background:var(--bg);border-color:var(--border);}
.btn-sm{padding:4px 9px;font-size:11px;}

/* LAYOUT */
.layout{display:flex;min-height:calc(100vh - 53px);}

/* WRITE PANEL */
.write-panel{width:var(--panel-w);min-width:var(--panel-w);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:sticky;top:53px;height:calc(100vh - 53px);overflow:hidden;transition:width .25s,min-width .25s;}
.write-panel.collapsed{width:0;min-width:0;overflow:hidden;border-right:none;}
.panel-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.panel-header h2{font-family:'DM Serif Display',serif;font-size:16px;}
.panel-tabs{display:flex;gap:2px;background:var(--bg);border-radius:var(--radius-sm);padding:3px;flex-shrink:0;margin:10px 14px 0;}
.panel-tab{flex:1;text-align:center;font-size:12px;font-weight:500;padding:5px 6px;border-radius:4px;cursor:pointer;color:var(--text-muted);transition:all .15s;border:none;background:none;font-family:'Instrument Sans',sans-serif;}
.panel-tab.active{background:var(--surface);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.08);}
.panel-body{flex:1;overflow-y:auto;padding:14px;}
.panel-body::-webkit-scrollbar{width:4px;}
.panel-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.write-area{display:flex;flex-direction:column;gap:10px;}
.write-field label{font-size:10px;font-family:'DM Mono',monospace;letter-spacing:.08em;text-transform:uppercase;color:var(--text-faint);display:block;margin-bottom:4px;}
.write-field input,.write-field textarea,.write-field select{width:100%;font-family:'Instrument Sans',sans-serif;font-size:13px;color:var(--text);background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:7px 9px;outline:none;transition:border-color .15s;}
.write-field input:focus,.write-field textarea:focus,.write-field select:focus{border-color:var(--accent);background:var(--accent-light);}
.write-field textarea{resize:vertical;min-height:68px;line-height:1.55;}
.write-field textarea.tall{min-height:110px;}
.write-field textarea.notes-ta{min-height:52px;font-style:italic;background:var(--gold-light);border-color:#E8D49A;}
.write-field textarea.notes-ta:focus{border-color:var(--gold);}
.shot-write-list{display:flex;flex-direction:column;gap:5px;}
.shot-write-item{display:flex;gap:5px;align-items:center;}
.shot-write-item input{flex:1;}
.shot-num{font-family:'DM Mono',monospace;font-size:10px;color:var(--text-faint);width:14px;flex-shrink:0;text-align:right;}
.shot-del-btn{background:none;border:none;color:var(--text-faint);cursor:pointer;font-size:14px;line-height:1;padding:0 3px;flex-shrink:0;}
.shot-del-btn:hover{color:var(--danger);}
.add-shot-write{font-size:12px;color:var(--text-faint);background:none;border:1px dashed var(--border);border-radius:var(--radius-sm);padding:5px 9px;cursor:pointer;width:100%;text-align:left;font-family:'Instrument Sans',sans-serif;transition:all .15s;margin-top:2px;}
.add-shot-write:hover{color:var(--accent);border-color:var(--accent);background:var(--accent-light);}
.panel-apply-btn{width:100%;margin-top:4px;}
.template-list{display:flex;flex-direction:column;gap:7px;}
.template-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:11px 13px;cursor:pointer;transition:all .15s;}
.template-card:hover{border-color:var(--accent);background:var(--accent-light);}
.template-card h4{font-size:13px;font-weight:600;margin-bottom:2px;}
.template-card p{font-size:11px;color:var(--text-muted);line-height:1.4;}
.template-card .t-tag{font-family:'DM Mono',monospace;font-size:10px;color:var(--accent);margin-top:4px;}

/* BOARD */
.board{flex:1;padding:24px 24px 80px;overflow-y:auto;min-width:0;}

/* ACT */
.act-block{margin-bottom:28px;}
.act-label{font-family:'DM Mono',monospace;font-size:10px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--text-muted);padding-bottom:10px;border-bottom:1px solid var(--border);margin-bottom:14px;display:flex;align-items:center;gap:10px;}
.act-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.act-name-el{cursor:pointer;border-radius:3px;padding:1px 4px;margin:-1px -4px;}
.act-name-el:hover{background:var(--bg);}
.act-name-input{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--text-muted);border:1px solid var(--accent);background:var(--accent-light);border-radius:4px;padding:2px 6px;outline:none;}
.act-add-card-row{display:flex;justify-content:center;margin-top:10px;}
.act-add-card-btn{display:flex;align-items:center;gap:6px;padding:8px 18px;background:var(--surface);border:1.5px dashed var(--border);border-radius:var(--radius);font-size:12px;color:var(--text-faint);cursor:pointer;font-family:'Instrument Sans',sans-serif;transition:all .15s;}
.act-add-card-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light);}

/* SCENE GRID */
.scene-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:13px;}

/* SCENE CARD */
.scene-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:box-shadow .2s,border-color .2s;position:relative;cursor:default;}
.scene-card:hover{border-color:var(--border-strong);box-shadow:0 3px 16px rgba(0,0,0,.07);}
.scene-card.dragging{opacity:.4;border:2px dashed var(--accent);}
.scene-card.drag-over{border:2px solid var(--accent);box-shadow:0 0 0 3px rgba(42,92,63,.15);}

/* DRAG HANDLE */
.drag-handle{position:absolute;top:0;left:0;right:0;height:20px;display:flex;align-items:center;justify-content:center;cursor:grab;z-index:10;opacity:0;transition:opacity .15s;}
.drag-handle:active{cursor:grabbing;}
.scene-card:hover .drag-handle{opacity:1;}
.drag-handle-dots{display:flex;gap:3px;}
.drag-handle-dot{width:3px;height:3px;border-radius:50%;background:var(--text-faint);}

/* MEDIA SWIPER */
.media-swiper{width:100%;aspect-ratio:16/9;background:var(--bg);border-bottom:1px solid var(--border);position:relative;overflow:hidden;}
.media-swiper.drag-over-media{background:var(--accent-light);border:2px dashed var(--accent);}
.swiper-track{display:flex;height:100%;transition:transform .28s cubic-bezier(.4,0,.2,1);}
.swiper-slide{min-width:100%;height:100%;position:relative;flex-shrink:0;}
.swiper-slide img,.swiper-slide video{width:100%;height:100%;object-fit:cover;display:block;cursor:zoom-in;}
.swiper-empty{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--text-faint);cursor:pointer;transition:background .15s;}
.swiper-empty:hover,.media-swiper.drag-over-media .swiper-empty{background:#dff0e8;}
.swiper-empty svg{opacity:.35;}
.swiper-empty span{font-size:11px;font-family:'DM Mono',monospace;}
.swiper-prev,.swiper-next{position:absolute;top:50%;transform:translateY(-50%);background:rgba(253,251,247,.88);border:1px solid var(--border);border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:10;font-size:15px;color:var(--text);transition:all .15s;opacity:0;}
.swiper-prev{left:7px;}.swiper-next{right:7px;}
.media-swiper:hover .swiper-prev,.media-swiper:hover .swiper-next{opacity:1;}
.swiper-prev:hover,.swiper-next:hover{background:var(--surface);}
.swiper-prev.h,.swiper-next.h{display:none;}
.swiper-dots{position:absolute;bottom:7px;left:50%;transform:translateX(-50%);display:flex;gap:5px;z-index:10;}
.swiper-dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.5);cursor:pointer;transition:all .15s;}
.swiper-dot.active{background:#fff;width:13px;border-radius:3px;}
.media-overlay{position:absolute;top:7px;right:7px;display:flex;gap:4px;z-index:10;opacity:0;transition:opacity .15s;}
.media-swiper:hover .media-overlay{opacity:1;}
.mo-btn{background:rgba(0,0,0,.5);color:#fff;border:none;border-radius:4px;padding:3px 7px;font-size:11px;cursor:pointer;font-family:'DM Mono',monospace;}
.mo-btn:hover{background:rgba(0,0,0,.8);}
.mo-btn.danger{background:rgba(196,74,42,.8);}
.mo-btn.danger:hover{background:rgba(196,74,42,1);}
.media-counter{position:absolute;top:7px;left:7px;background:rgba(0,0,0,.45);color:#fff;border-radius:4px;padding:3px 7px;font-size:10px;font-family:'DM Mono',monospace;display:none;}

/* CARD BODY */
.card-body{padding:12px 14px;}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:7px;margin-bottom:7px;}
.scene-meta{flex:1;min-width:0;}
.scene-number{font-family:'DM Mono',monospace;font-size:10px;color:var(--text-faint);letter-spacing:.05em;margin-bottom:2px;}
.scene-title-el{font-family:'DM Serif Display',serif;font-size:15px;line-height:1.25;color:var(--text);cursor:pointer;border-radius:3px;padding:1px 3px;margin:-1px -3px;}
.scene-title-el:hover{background:var(--bg);}
.scene-title-input{font-family:'DM Serif Display',serif;font-size:15px;line-height:1.25;color:var(--text);border:1px solid var(--accent);background:var(--accent-light);border-radius:4px;padding:2px 6px;width:100%;outline:none;}
.time-badge{font-family:'DM Mono',monospace;font-size:11px;background:var(--gold-light);color:var(--gold);border:1px solid #E8D49A;padding:3px 7px;border-radius:var(--radius-sm);white-space:nowrap;flex-shrink:0;cursor:pointer;}
.time-badge:hover{background:#F5EAC0;}
.time-input{font-family:'DM Mono',monospace;font-size:11px;background:var(--gold-light);color:var(--gold);border:1px solid #E8D49A;padding:3px 6px;border-radius:var(--radius-sm);width:108px;outline:none;text-align:center;}
.loc-pill{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:2px 9px;border-radius:20px;border:1px solid var(--border);color:var(--text-muted);margin-bottom:7px;cursor:pointer;transition:all .15s;}
.loc-pill svg{width:9px;height:9px;opacity:.6;}
.loc-sel-inline{font-size:11px;border:1px solid var(--border);border-radius:20px;padding:2px 8px;color:var(--text-muted);background:var(--surface);outline:none;cursor:pointer;font-family:'Instrument Sans',sans-serif;}
.slabel{font-size:10px;font-family:'DM Mono',monospace;letter-spacing:.08em;text-transform:uppercase;color:var(--text-faint);margin-bottom:3px;}
.lyrics-block{font-size:12px;font-style:italic;color:var(--text-muted);line-height:1.6;background:var(--bg);border-radius:var(--radius-sm);padding:6px 9px;cursor:pointer;border:1px solid transparent;white-space:pre-line;margin-bottom:7px;min-height:28px;}
.lyrics-block:hover{border-color:var(--border);}
.lyrics-ta{font-size:12px;font-style:italic;color:var(--text-muted);line-height:1.6;background:var(--accent-light);border:1px solid var(--accent);border-radius:var(--radius-sm);padding:6px 9px;width:100%;resize:vertical;outline:none;min-height:58px;font-family:'Instrument Sans',sans-serif;margin-bottom:7px;}
.shot-list-card{display:flex;flex-direction:column;gap:3px;margin-bottom:5px;}
.shot-row{display:flex;gap:6px;align-items:flex-start;font-size:12px;color:var(--text);line-height:1.5;}
.shot-dot-c{width:5px;height:5px;border-radius:50%;background:var(--accent);margin-top:6px;flex-shrink:0;}
.shot-txt{flex:1;cursor:pointer;}
.shot-txt:hover{color:var(--accent);}
.shot-txt-inp{flex:1;font-size:12px;border:1px solid var(--accent);border-radius:4px;padding:2px 6px;background:var(--accent-light);outline:none;font-family:'Instrument Sans',sans-serif;}
.shot-x{background:none;border:none;cursor:pointer;color:var(--text-faint);font-size:12px;line-height:1;padding:0 2px;flex-shrink:0;opacity:0;transition:opacity .15s;}
.shot-row:hover .shot-x{opacity:1;}
.shot-x:hover{color:var(--danger);}
.add-shot-c{font-size:11px;color:var(--text-faint);background:none;border:1px dashed var(--border);border-radius:var(--radius-sm);padding:4px 9px;cursor:pointer;width:100%;text-align:left;font-family:'Instrument Sans',sans-serif;transition:all .15s;margin-bottom:7px;}
.add-shot-c:hover{color:var(--accent);border-color:var(--accent);background:var(--accent-light);}
.notes-block{font-size:12px;color:var(--text-muted);line-height:1.5;background:var(--gold-light);border:1px solid #E8D49A;border-left:3px solid var(--gold);border-radius:var(--radius-sm);padding:6px 9px;cursor:pointer;min-height:26px;font-style:italic;}
.notes-block:hover{background:#F5EAC0;}
.notes-ta{font-size:12px;color:var(--text-muted);line-height:1.5;background:var(--gold-light);border:1px solid var(--gold);border-left:3px solid var(--gold);border-radius:var(--radius-sm);padding:6px 9px;width:100%;resize:vertical;outline:none;min-height:52px;font-family:'Instrument Sans',sans-serif;font-style:italic;}

/* CARD FOOTER */
.card-footer{padding:7px 13px;border-top:1px solid var(--border);display:flex;gap:5px;align-items:center;background:var(--bg);}
.status-sel{font-size:11px;font-family:'DM Mono',monospace;border:1px solid var(--border);border-radius:4px;padding:3px 5px;background:var(--surface);color:var(--text-muted);outline:none;cursor:pointer;flex:1;}
.s-not-shot{color:var(--text-faint);}.s-scheduled{color:var(--gold);border-color:var(--gold);background:var(--gold-light);}
.s-shot{color:var(--accent);border-color:var(--accent);background:var(--accent-light);}
.s-locked{color:#7A5C3F;border-color:#C8A870;background:#F5EDE0;}
.card-edit-btn{font-size:11px;color:var(--text-faint);background:none;border:1px solid transparent;border-radius:4px;padding:3px 7px;cursor:pointer;font-family:'Instrument Sans',sans-serif;}
.card-edit-btn:hover{border-color:var(--border);color:var(--accent);background:var(--accent-light);}
.card-del-btn{font-size:11px;color:var(--text-faint);background:none;border:1px solid transparent;border-radius:4px;padding:3px 7px;cursor:pointer;font-family:'Instrument Sans',sans-serif;}
.card-del-btn:hover{color:var(--danger);border-color:#E8C0B0;background:var(--danger-light);}

/* ADD ACT */
.add-act-row{display:flex;justify-content:center;margin:8px 0 20px;}
.add-act-btn{display:flex;align-items:center;gap:6px;padding:8px 20px;background:var(--surface);border:1.5px dashed var(--border);border-radius:var(--radius);font-size:12px;color:var(--text-faint);cursor:pointer;font-family:'Instrument Sans',sans-serif;transition:all .15s;}
.add-act-btn:hover{border-color:var(--gold);color:var(--gold);background:var(--gold-light);}

/* LIGHTBOX */
.lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:1000;align-items:center;justify-content:center;flex-direction:column;}
.lightbox.open{display:flex;}
.lightbox-media{max-width:90vw;max-height:85vh;border-radius:8px;object-fit:contain;}
.lightbox video.lightbox-media{max-width:90vw;max-height:85vh;}
.lightbox-close{position:absolute;top:20px;right:24px;background:none;border:none;color:#fff;font-size:28px;cursor:pointer;opacity:.7;line-height:1;}
.lightbox-close:hover{opacity:1;}
.lightbox-nav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.15);border:none;color:#fff;font-size:28px;width:48px;height:48px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.lightbox-nav:hover{background:rgba(255,255,255,.25);}
.lightbox-prev{left:20px;}.lightbox-next{right:20px;}
.lightbox-counter{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.6);font-family:'DM Mono',monospace;font-size:12px;}
.lightbox-caption{position:absolute;bottom:46px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.5);font-size:12px;font-family:'DM Mono',monospace;white-space:nowrap;}

/* TOAST */
.toast{position:fixed;bottom:22px;right:22px;background:var(--accent);color:#fff;padding:9px 16px;border-radius:var(--radius-sm);font-size:13px;font-weight:500;z-index:999;opacity:0;transform:translateY(8px);transition:all .2s;pointer-events:none;}
.toast.show{opacity:1;transform:translateY(0);}

.hidden-file{display:none;}

/* PRINT / PDF */
@media print{
  body{background:#fff;}
  .header,.write-panel,.card-footer .card-edit-btn,.card-footer .card-del-btn,.drag-handle,.media-overlay,.swiper-prev,.swiper-next,.swiper-dots,.media-counter,.add-act-row,.act-add-card-row,.toast,.lightbox{display:none!important;}
  .layout{display:block;}
  .board{padding:0;}
  .act-block{page-break-inside:avoid;margin-bottom:24px;}
  .scene-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .scene-card{border:1px solid #ccc;border-radius:8px;overflow:hidden;page-break-inside:avoid;break-inside:avoid;}
  .media-swiper{aspect-ratio:16/9;}
  .swiper-track{transform:none!important;}
  .swiper-slide:not(:first-child){display:none;}
  .card-body{padding:8px 10px;}
  .card-footer{display:none;}
  .act-label{border-bottom:2px solid #333;padding-bottom:6px;margin-bottom:10px;font-size:9px;}
  .shot-x,.add-shot-c{display:none;}
  @page{size:A4 landscape;margin:15mm;}
}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1>Little Barditchevers</h1>
    <p id="hSub">STORYBOARD V1 &nbsp;·&nbsp; LAWRENCE NY &nbsp;·&nbsp; TYH × MENDY PORTNOY</p>
  </div>
  <div class="header-actions">
    <button class="btn btn-ghost btn-sm" onclick="togglePanel()" id="panelToggleBtn">◀ Panel</button>
    <button class="btn btn-gold btn-sm" onclick="exportPDF()">&#128196; Export PDF</button>
    <button class="btn btn-sm" onclick="exportJSON()">Export JSON</button>
    <button class="btn btn-sm" onclick="document.getElementById('importFile').click()">Import</button>
    <button class="btn btn-primary btn-sm" onclick="addSceneGlobal()">+ New scene</button>
  </div>
</div>

<div class="layout">
  <div class="write-panel" id="writePanel">
    <div class="panel-header">
      <h2>Write</h2>
      <button class="btn btn-sm btn-ghost" onclick="togglePanel()">✕</button>
    </div>
    <div class="panel-tabs">
      <button class="panel-tab active" id="tab-compose" onclick="switchTab('compose')">Compose</button>
      <button class="panel-tab" id="tab-templates" onclick="switchTab('templates')">Templates</button>
    </div>
    <div class="panel-body" id="panelBody"></div>
  </div>
  <div class="board" id="board"></div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <button class="lightbox-close" onclick="closeLightbox()">&#215;</button>
  <button class="lightbox-nav lightbox-prev" id="lbPrev" onclick="lbNav(-1)">&#8249;</button>
  <button class="lightbox-nav lightbox-next" id="lbNext" onclick="lbNav(1)">&#8250;</button>
  <div id="lbMediaWrap"></div>
  <div class="lightbox-caption" id="lbCaption"></div>
  <div class="lightbox-counter" id="lbCounter"></div>
</div>

<div class="toast" id="toast"></div>
<input type="file" id="importFile" class="hidden-file" accept=".json" onchange="handleImport(event)">

<script>
const LOCATIONS=['outside courtroom','courtroom set','central avenue','park','eye doctor office','boat','assorted / montage','other'];

let scenes=loadScenes();
let panelOpen=true;
let activeTab='compose';
let composeState={act:'',num:'',title:'',time:'',location:'',lyrics:'',shots:[''],notes:''};
// lightbox state
let lbMedia=[];let lbIdx=0;
// drag state
let dragId=null;let dragOverId=null;

function loadScenes(){
  try{const s=localStorage.getItem('bv3');if(s){const p=JSON.parse(s);if(p&&p.length)return p;}}catch(e){}
  return JSON.parse(JSON.stringify(INITIAL));
}
function save(){localStorage.setItem('bv3',JSON.stringify(scenes));}
function toast(msg,dur=2200){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),dur);}

// ── PANEL ──
function togglePanel(){
  panelOpen=!panelOpen;
  const p=document.getElementById('writePanel');
  p.classList.toggle('collapsed',!panelOpen);
  document.getElementById('panelToggleBtn').textContent=panelOpen?'◀ Panel':'▶ Panel';
}
function switchTab(tab){
  activeTab=tab;
  document.querySelectorAll('.panel-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  renderPanel();
}
function renderPanel(){
  const body=document.getElementById('panelBody');body.innerHTML='';
  activeTab==='compose'?renderCompose(body):renderTemplates(body);
}
function renderCompose(body){
  const acts=[...new Set(scenes.map(s=>s.act))];
  const w=document.createElement('div');w.className='write-area';
  const fld=(lbl,type,key,ph,cls)=>{
    const d=document.createElement('div');d.className='write-field';
    const l=document.createElement('label');l.textContent=lbl;d.appendChild(l);
    if(type==='act-sel'){
      const sel=document.createElement('select');
      [...acts,'＋ New act…'].forEach(a=>{const o=document.createElement('option');o.value=a;o.textContent=a;if(composeState[key]===a)o.selected=true;sel.appendChild(o);});
      const inp=document.createElement('input');inp.type='text';inp.placeholder='New act name…';inp.style.cssText='display:none;margin-top:6px;';
      sel.onchange=()=>{if(sel.value==='＋ New act…'){inp.style.display='block';composeState[key]='';inp.focus();}else{inp.style.display='none';composeState[key]=sel.value;}};
      inp.oninput=()=>{composeState[key]=inp.value;};
      d.appendChild(sel);d.appendChild(inp);
    } else {
      const el=document.createElement(type==='textarea'?'textarea':'input');
      if(type==='input')el.type='text';
      if(cls)el.className=cls;
      el.placeholder=ph||'';el.value=composeState[key]||'';
      el.oninput=()=>{composeState[key]=el.value;};d.appendChild(el);
    }
    return d;
  };
  w.appendChild(fld('Act','act-sel','act',''));
  w.appendChild(fld('Scene number','input','num','e.g. Scene 4'));
  w.appendChild(fld('Title','input','title','e.g. High chorus 1A'));
  w.appendChild(fld('Timecode','input','time','e.g. 0:31 – 0:55'));
  // location
  const ld=document.createElement('div');ld.className='write-field';
  const ll=document.createElement('label');ll.textContent='Location';ld.appendChild(ll);
  const lsel=document.createElement('select');
  LOCATIONS.forEach(l=>{const o=document.createElement('option');o.value=l;o.textContent=l;if(composeState.location===l)o.selected=true;lsel.appendChild(o);});
  lsel.onchange=()=>{composeState.location=lsel.value;};ld.appendChild(lsel);w.appendChild(ld);
  w.appendChild(fld('Lyrics','textarea','lyrics','Paste or type lyrics…','tall'));
  // shots
  const sd=document.createElement('div');sd.className='write-field';
  const sl=document.createElement('label');sl.textContent='Key shots';sd.appendChild(sl);
  const slist=document.createElement('div');slist.className='shot-write-list';
  const rShots=()=>{
    slist.innerHTML='';
    composeState.shots.forEach((sh,i)=>{
      const row=document.createElement('div');row.className='shot-write-item';
      const num=document.createElement('span');num.className='shot-num';num.textContent=(i+1)+'.';
      const inp=document.createElement('input');inp.type='text';inp.value=sh;inp.placeholder='Describe the shot…';inp.oninput=()=>{composeState.shots[i]=inp.value;};
      const del=document.createElement('button');del.className='shot-del-btn';del.innerHTML='✕';del.onclick=()=>{composeState.shots.splice(i,1);rShots();};
      row.appendChild(num);row.appendChild(inp);row.appendChild(del);slist.appendChild(row);
    });
  };rShots();
  const asb=document.createElement('button');asb.className='add-shot-write';asb.textContent='+ add shot';
  asb.onclick=()=>{composeState.shots.push('');rShots();setTimeout(()=>{const ins=slist.querySelectorAll('input');ins[ins.length-1].focus();},40);};
  sd.appendChild(slist);sd.appendChild(asb);w.appendChild(sd);
  w.appendChild(fld('Director\'s note','textarea','notes','Chase golden hour…','notes-ta'));
  const ab=document.createElement('button');ab.className='btn btn-primary panel-apply-btn';ab.textContent='Add scene to board';ab.onclick=applyCompose;w.appendChild(ab);
  const cb=document.createElement('button');cb.className='btn panel-apply-btn';cb.textContent='Clear form';
  cb.onclick=()=>{composeState={act:'',num:'',title:'',time:'',location:'',lyrics:'',shots:[''],notes:''};renderPanel();};w.appendChild(cb);
  body.appendChild(w);
}
function renderTemplates(body){
  const list=document.createElement('div');list.className='template-list';
  TEMPLATES.forEach(t=>{
    const c=document.createElement('div');c.className='template-card';
    c.innerHTML=`<h4>${t.name}</h4><p>${t.shots.slice(0,2).join(' · ')}</p><div class="t-tag">${t.tag}</div>`;
    c.onclick=()=>{composeState.lyrics=t.lyrics;composeState.shots=[...t.shots];composeState.notes=t.notes;switchTab('compose');toast('Template loaded');};
    list.appendChild(c);
  });body.appendChild(list);
}
function applyCompose(){
  const id=Math.max(...scenes.map(s=>s.id),0)+1;
  scenes.push({id,act:composeState.act||'New act',num:composeState.num||'Scene '+id,title:composeState.title||'Untitled',time:composeState.time||'',location:composeState.location||'other',status:'not-shot',lyrics:composeState.lyrics||'',shots:(composeState.shots||[]).filter(s=>s.trim()),notes:composeState.notes||'',media:[]});
  save();render();toast('Scene added');
  setTimeout(()=>{document.querySelectorAll('.scene-card');const all=document.querySelectorAll('.scene-card');if(all.length)all[all.length-1].scrollIntoView({behavior:'smooth',block:'nearest'});},120);
}

// ── BOARD ──
function render(){
  const board=document.getElementById('board');board.innerHTML='';
  const acts=[...new Set(scenes.map(s=>s.act))];
  acts.forEach(act=>{
    const actScenes=scenes.filter(s=>s.act===act);
    const block=document.createElement('div');block.className='act-block';block.dataset.act=act;
    // act label
    const label=document.createElement('div');label.className='act-label';
    const color=LOC_COLORS[actScenes[0]?.location]||'#888';
    const dot=document.createElement('div');dot.className='act-dot';dot.style.background=color;
    const nameEl=document.createElement('span');nameEl.className='act-name-el';nameEl.textContent=act;
    nameEl.onclick=()=>editActName(act,nameEl);
    label.appendChild(dot);label.appendChild(nameEl);
    block.appendChild(label);
    // grid
    const grid=document.createElement('div');grid.className='scene-grid';
    actScenes.forEach(scene=>{grid.appendChild(makeCard(scene));});
    block.appendChild(grid);
    // + add card to this act
    const addRow=document.createElement('div');addRow.className='act-add-card-row';
    const addBtn=document.createElement('button');addBtn.className='act-add-card-btn';
    addBtn.innerHTML='<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Add scene to this act';
    addBtn.onclick=()=>addSceneToAct(act);
    addRow.appendChild(addBtn);block.appendChild(addRow);
    board.appendChild(block);
  });
  // add new act
  const addActRow=document.createElement('div');addActRow.className='add-act-row';
  const addActBtn=document.createElement('button');addActBtn.className='add-act-btn';
  addActBtn.innerHTML='<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Add new act';
  addActBtn.onclick=addAct;addActRow.appendChild(addActBtn);board.appendChild(addActRow);
  renderPanel();
}

function makeCard(scene){
  const card=document.createElement('div');
  card.className='scene-card';card.dataset.id=scene.id;card.draggable=true;
  // drag events
  card.addEventListener('dragstart',e=>{dragId=scene.id;card.classList.add('dragging');e.dataTransfer.effectAllowed='move';});
  card.addEventListener('dragend',()=>{dragId=null;card.classList.remove('dragging');document.querySelectorAll('.scene-card').forEach(c=>c.classList.remove('drag-over'));render();});
  card.addEventListener('dragover',e=>{e.preventDefault();if(dragId&&dragId!==scene.id){card.classList.add('drag-over');}});
  card.addEventListener('dragleave',()=>card.classList.remove('drag-over'));
  card.addEventListener('drop',e=>{
    e.preventDefault();card.classList.remove('drag-over');
    if(!dragId||dragId===scene.id)return;
    const fromIdx=scenes.findIndex(s=>s.id===dragId);
    const toIdx=scenes.findIndex(s=>s.id===scene.id);
    const moved=scenes.splice(fromIdx,1)[0];
    scenes.splice(toIdx,0,moved);
    save();render();toast('Scene moved');
  });

  // drag handle
  const handle=document.createElement('div');handle.className='drag-handle';
  handle.innerHTML='<div class="drag-handle-dots">'+Array(6).fill('<div class="drag-handle-dot"></div>').join('')+'</div>';
  card.appendChild(handle);

  // SWIPER
  const swiper=document.createElement('div');swiper.className='media-swiper';
  const media=scene.media||[];let curIdx=0;
  const track=document.createElement('div');track.className='swiper-track';
  swiper.appendChild(track);

  const rSwiper=()=>{
    track.innerHTML='';
    if(!media.length){
      const slide=document.createElement('div');slide.className='swiper-slide';
      const empty=document.createElement('div');empty.className='swiper-empty';
      empty.innerHTML=`<svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg><span>drop or click to add media</span>`;
      empty.onclick=()=>fileInp.click();
      slide.appendChild(empty);track.appendChild(slide);
    } else {
      media.forEach((m,i)=>{
        const slide=document.createElement('div');slide.className='swiper-slide';
        if(m.type==='video'){
          const v=document.createElement('video');v.src=m.url;v.muted=true;v.style.cssText='width:100%;height:100%;object-fit:cover;display:block;cursor:zoom-in;';
          v.onclick=()=>openLightbox(media,i,scene.title);slide.appendChild(v);
        } else {
          const img=document.createElement('img');img.src=m.url;img.alt='';
          img.onclick=()=>openLightbox(media,i,scene.title);slide.appendChild(img);
        }
        track.appendChild(slide);
      });
      if(curIdx>=media.length)curIdx=media.length-1;
      track.style.transform=`translateX(-${curIdx*100}%)`;
    }
    prevBtn.classList.toggle('h',media.length<=1||curIdx===0);
    nextBtn.classList.toggle('h',media.length<=1||curIdx>=media.length-1);
    dotsEl.innerHTML='';
    if(media.length>1){
      media.forEach((_,i)=>{const d=document.createElement('div');d.className='swiper-dot'+(i===curIdx?' active':'');d.onclick=()=>{curIdx=i;track.style.transform=`translateX(-${curIdx*100}%)`;rSwiper();};dotsEl.appendChild(d);});
    }
    counter.textContent=media.length>1?`${curIdx+1} / ${media.length}`:'';
    counter.style.display=media.length>1?'block':'none';
    // update remove button
    const rmb=swiper.querySelector('.mo-btn.danger');if(rmb)rmb.style.display=media.length>0?'':'none';
  };

  const prevBtn=document.createElement('button');prevBtn.className='swiper-prev h';prevBtn.innerHTML='&#8249;';
  prevBtn.onclick=e=>{e.stopPropagation();if(curIdx>0){curIdx--;track.style.transform=`translateX(-${curIdx*100}%)`;rSwiper();}};
  const nextBtn=document.createElement('button');nextBtn.className='swiper-next h';nextBtn.innerHTML='&#8250;';
  nextBtn.onclick=e=>{e.stopPropagation();if(curIdx<media.length-1){curIdx++;track.style.transform=`translateX(-${curIdx*100}%)`;rSwiper();}};
  const dotsEl=document.createElement('div');dotsEl.className='swiper-dots';
  const counter=document.createElement('div');counter.className='media-counter';

  // overlay controls
  const overlay=document.createElement('div');overlay.className='media-overlay';
  const addMo=document.createElement('button');addMo.className='mo-btn';addMo.textContent='+ Add';addMo.onclick=e=>{e.stopPropagation();fileInp.click();};
  const rmMo=document.createElement('button');rmMo.className='mo-btn danger';rmMo.textContent='Remove';
  rmMo.onclick=e=>{e.stopPropagation();if(media.length>0){media.splice(curIdx,1);if(curIdx>=media.length)curIdx=Math.max(0,media.length-1);save();rSwiper();}};
  overlay.appendChild(counter);overlay.appendChild(addMo);overlay.appendChild(rmMo);

  // file input (supports multiple)
  const fileInp=document.createElement('input');fileInp.type='file';fileInp.accept='image/*,video/*';fileInp.multiple=true;fileInp.className='hidden-file';fileInp.id='fi-'+scene.id;
  fileInp.onchange=e=>{
    Array.from(e.target.files).forEach(f=>{media.push({url:URL.createObjectURL(f),type:f.type.startsWith('video')?'video':'image',name:f.name});});
    curIdx=media.length-1;save();rSwiper();toast(e.target.files.length+' file(s) added');e.target.value='';
  };

  // drag-and-drop onto swiper
  swiper.addEventListener('dragover',e=>{if(e.dataTransfer.types.includes('Files')){e.preventDefault();swiper.classList.add('drag-over-media');}});
  swiper.addEventListener('dragleave',()=>swiper.classList.remove('drag-over-media'));
  swiper.addEventListener('drop',e=>{
    e.preventDefault();e.stopPropagation();swiper.classList.remove('drag-over-media');
    if(e.dataTransfer.files&&e.dataTransfer.files.length){
      Array.from(e.dataTransfer.files).filter(f=>f.type.startsWith('image')||f.type.startsWith('video')).forEach(f=>{media.push({url:URL.createObjectURL(f),type:f.type.startsWith('video')?'video':'image',name:f.name});});
      curIdx=media.length-1;save();rSwiper();toast('Media dropped in');
    }
  });

  swiper.appendChild(prevBtn);swiper.appendChild(nextBtn);swiper.appendChild(dotsEl);swiper.appendChild(overlay);swiper.appendChild(fileInp);
  rSwiper();
  card.appendChild(swiper);

  // BODY
  const body=document.createElement('div');body.className='card-body';
  const top=document.createElement('div');top.className='card-top';
  const meta=document.createElement('div');meta.className='scene-meta';
  const numEl=document.createElement('div');numEl.className='scene-number';numEl.textContent=scene.num;
  const titleEl=document.createElement('div');titleEl.className='scene-title-el';titleEl.textContent=scene.title;
  titleEl.onclick=()=>iEdit(scene.id,'title',titleEl,'scene-title-input');
  meta.appendChild(numEl);meta.appendChild(titleEl);
  const timeBadge=document.createElement('div');timeBadge.className='time-badge';timeBadge.textContent=scene.time||'0:00';
  timeBadge.onclick=()=>iEditTime(scene.id,timeBadge);
  top.appendChild(meta);top.appendChild(timeBadge);body.appendChild(top);

  const locColor=LOC_COLORS[scene.location]||'#888';
  const locPill=document.createElement('div');locPill.className='loc-pill';
  locPill.style.cssText=`border-color:${locColor}55;color:${locColor};background:${locColor}12;`;
  locPill.innerHTML=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>${scene.location}`;
  locPill.onclick=()=>iEditLoc(scene.id,locPill);body.appendChild(locPill);

  const lyrLbl=document.createElement('div');lyrLbl.className='slabel';lyrLbl.textContent='Lyrics';
  const lyrEl=document.createElement('div');lyrEl.className='lyrics-block';lyrEl.textContent=scene.lyrics||'Click to add lyrics…';
  lyrEl.onclick=()=>iEditTA(scene.id,'lyrics',lyrEl,'lyrics-ta');
  body.appendChild(lyrLbl);body.appendChild(lyrEl);

  const shotLbl=document.createElement('div');shotLbl.className='slabel';shotLbl.textContent='Key shots';body.appendChild(shotLbl);
  const shotList=document.createElement('div');shotList.className='shot-list-card';
  (scene.shots||[]).forEach((sh,i)=>{
    const row=document.createElement('div');row.className='shot-row';
    const dot=document.createElement('div');dot.className='shot-dot-c';
    const txt=document.createElement('div');txt.className='shot-txt';txt.textContent=sh;txt.onclick=()=>iEditShot(scene.id,i,txt);
    const x=document.createElement('button');x.className='shot-x';x.innerHTML='✕';x.onclick=()=>{const s=scenes.find(s=>s.id===scene.id);s.shots.splice(i,1);save();render();};
    row.appendChild(dot);row.appendChild(txt);row.appendChild(x);shotList.appendChild(row);
  });body.appendChild(shotList);
  const asb=document.createElement('button');asb.className='add-shot-c';asb.textContent='+ add shot';
  asb.onclick=()=>{const s=scenes.find(s=>s.id===scene.id);s.shots.push('New shot');save();render();};body.appendChild(asb);

  const noteLbl=document.createElement('div');noteLbl.className='slabel';noteLbl.textContent="Director's note";
  const noteEl=document.createElement('div');noteEl.className='notes-block';noteEl.textContent=scene.notes||'Click to add a note…';
  noteEl.onclick=()=>iEditTA(scene.id,'notes',noteEl,'notes-ta');
  body.appendChild(noteLbl);body.appendChild(noteEl);
  card.appendChild(body);

  // FOOTER
  const footer=document.createElement('div');footer.className='card-footer';
  const stSel=document.createElement('select');stSel.className='status-sel s-'+scene.status;
  [['not-shot','Not shot'],['scheduled','Scheduled'],['shot','Shot ✓'],['locked','Locked']].forEach(([v,l])=>{const o=document.createElement('option');o.value=v;o.textContent=l;if(scene.status===v)o.selected=true;stSel.appendChild(o);});
  stSel.onchange=()=>{const s=scenes.find(s=>s.id===scene.id);s.status=stSel.value;stSel.className='status-sel s-'+s.status;save();};
  const editBtn=document.createElement('button');editBtn.className='card-edit-btn';editBtn.textContent='Edit in panel ↗';editBtn.onclick=()=>loadIntoPanel(scene.id);
  const delBtn=document.createElement('button');delBtn.className='card-del-btn';delBtn.textContent='Delete';delBtn.onclick=()=>{if(confirm('Delete "'+scene.title+'"?')){scenes=scenes.filter(s=>s.id!==scene.id);save();render();}};
  footer.appendChild(stSel);footer.appendChild(editBtn);footer.appendChild(delBtn);card.appendChild(footer);
  return card;
}

// INLINE EDIT HELPERS
function iEdit(id,key,el,cls){const s=scenes.find(s=>s.id===id);const inp=document.createElement('input');inp.type='text';inp.className=cls;inp.value=s[key];el.replaceWith(inp);inp.focus();inp.select();const done=()=>{s[key]=inp.value||s[key];save();render();};inp.onblur=done;inp.onkeydown=e=>{if(e.key==='Enter')done();if(e.key==='Escape')render();};}
function iEditTime(id,el){const s=scenes.find(s=>s.id===id);const inp=document.createElement('input');inp.className='time-input';inp.value=s.time;el.replaceWith(inp);inp.focus();inp.select();const done=()=>{s.time=inp.value;save();render();};inp.onblur=done;inp.onkeydown=e=>{if(e.key==='Enter')done();if(e.key==='Escape')render();};}
function iEditTA(id,key,el,cls){const s=scenes.find(s=>s.id===id);const ta=document.createElement('textarea');ta.className=cls;ta.value=s[key]||'';el.replaceWith(ta);ta.focus();const done=()=>{s[key]=ta.value;save();render();};ta.onblur=done;ta.onkeydown=e=>{if(e.key==='Escape')done();};}
function iEditShot(id,idx,el){const s=scenes.find(s=>s.id===id);const inp=document.createElement('input');inp.className='shot-txt-inp';inp.value=s.shots[idx];el.replaceWith(inp);inp.focus();inp.select();const done=()=>{s.shots[idx]=inp.value||s.shots[idx];save();render();};inp.onblur=done;inp.onkeydown=e=>{if(e.key==='Enter')done();if(e.key==='Escape')render();};}
function iEditLoc(id,el){const s=scenes.find(s=>s.id===id);const sel=document.createElement('select');sel.className='loc-sel-inline';LOCATIONS.forEach(l=>{const o=document.createElement('option');o.value=l;o.textContent=l;if(s.location===l)o.selected=true;sel.appendChild(o);});el.replaceWith(sel);sel.focus();const done=()=>{s.location=sel.value;save();render();};sel.onblur=done;sel.onchange=done;}
function editActName(actName,el){const inp=document.createElement('input');inp.type='text';inp.className='act-name-input';inp.value=actName;el.replaceWith(inp);inp.focus();inp.select();const done=()=>{const n=inp.value.trim()||actName;scenes.forEach(s=>{if(s.act===actName)s.act=n;});save();render();};inp.onblur=done;inp.onkeydown=e=>{if(e.key==='Enter')done();if(e.key==='Escape')render();};}

function loadIntoPanel(id){
  const s=scenes.find(s=>s.id===id);
  composeState={act:s.act,num:s.num,title:s.title,time:s.time,location:s.location,lyrics:s.lyrics||'',shots:[...(s.shots||[''])],notes:s.notes||''};
  if(!panelOpen)togglePanel();switchTab('compose');toast('Loaded into panel');
}
function addSceneToAct(act){
  composeState={act,num:'',title:'',time:'',location:'',lyrics:'',shots:[''],notes:''};
  if(!panelOpen)togglePanel();switchTab('compose');toast('Fill in and click "Add scene to board"');
}
function addSceneGlobal(){composeState={act:'',num:'',title:'',time:'',location:'',lyrics:'',shots:[''],notes:''};if(!panelOpen)togglePanel();switchTab('compose');toast('Fill in and click "Add scene to board"');}
function addAct(){
  const name=prompt('New act name (e.g. "Act 6 — Rooftop"):');
  if(!name||!name.trim())return;
  const id=Math.max(...scenes.map(s=>s.id),0)+1;
  scenes.push({id,act:name.trim(),num:'Scene '+id,title:'New scene',time:'',location:'other',status:'not-shot',lyrics:'',shots:[''],notes:'',media:[]});
  save();render();toast('New act added');
}

// ── LIGHTBOX ──
function openLightbox(media,idx,title){
  lbMedia=media;lbIdx=idx;
  const lb=document.getElementById('lightbox');lb.classList.add('open');
  document.getElementById('lbCaption').textContent=title;
  renderLB();
  document.addEventListener('keydown',lbKey);
}
function closeLightbox(){
  document.getElementById('lightbox').classList.remove('open');
  document.removeEventListener('keydown',lbKey);
  const w=document.getElementById('lbMediaWrap');
  w.querySelectorAll('video').forEach(v=>v.pause());
  w.innerHTML='';
}
function renderLB(){
  const w=document.getElementById('lbMediaWrap');
  w.querySelectorAll('video').forEach(v=>v.pause());
  w.innerHTML='';
  const m=lbMedia[lbIdx];
  if(!m)return;
  if(m.type==='video'){const v=document.createElement('video');v.src=m.url;v.controls=true;v.autoplay=true;v.className='lightbox-media';w.appendChild(v);}
  else{const img=document.createElement('img');img.src=m.url;img.className='lightbox-media';w.appendChild(img);}
  document.getElementById('lbCounter').textContent=lbMedia.length>1?`${lbIdx+1} / ${lbMedia.length}`:'';
  document.getElementById('lbPrev').style.display=lbIdx>0?'flex':'none';
  document.getElementById('lbNext').style.display=lbIdx<lbMedia.length-1?'flex':'none';
}
function lbNav(dir){lbIdx=Math.max(0,Math.min(lbMedia.length-1,lbIdx+dir));renderLB();}
function lbKey(e){if(e.key==='Escape')closeLightbox();if(e.key==='ArrowLeft')lbNav(-1);if(e.key==='ArrowRight')lbNav(1);}
document.getElementById('lightbox').onclick=e=>{if(e.target===e.currentTarget)closeLightbox();};

// ── EXPORT ──
function exportPDF(){
  toast('Opening print dialog — use "Save as PDF" in your browser…',4000);
  setTimeout(()=>window.print(),600);
}
function exportJSON(){const blob=new Blob([JSON.stringify(scenes,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='barditchevers_storyboard.json';a.click();toast('Exported!');}
function handleImport(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{scenes=JSON.parse(ev.target.result);save();render();toast('Imported!');}catch{toast('Invalid file');}};r.readAsText(f);e.target.value='';}

render();
</script>
